<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1"/>
<title>שאגת הארי</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&family=Noto+Color+Emoji&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Heebo', 'Noto Color Emoji', sans-serif;-webkit-font-smoothing:antialiased;background:#eae9e4;}

/* LOGIN */
#loginScreen{position:fixed;inset:0;background:#eae9e4;display:flex;align-items:center;justify-content:center;z-index:1000;}
.login-card{background:#fff;border-radius:18px;padding:38px 32px;text-align:center;box-shadow:0 4px 32px rgba(0,0,0,.12);max-width:320px;width:90%;}
.login-logo-img{width:72px;height:72px;border-radius:50%;margin:0 auto 14px;display:block;object-fit:cover;}
.login-title{font-size:20px;font-weight:900;color:#111;margin-bottom:4px;}
.login-sub{font-size:13px;color:#888;margin-bottom:24px;}
.login-err{font-size:12px;color:#e02020;margin-top:10px;display:none;font-weight:600;}

/* APP */
#app{height:100%;display:none;flex-direction:column;}

/* HEADER */
header{
  background:#fff;
  border-bottom:1px solid rgba(0,0,0,.08);
  height:56px;padding:0 14px;
  display:flex;align-items:center;gap:12px;
  flex-shrink:0;
  position:sticky;top:0;z-index:100;
}
.hdr-avatar{width:38px;height:38px;border-radius:50%;object-fit:cover;flex-shrink:0;}
.hdr-info{flex:1;min-width:0;}
.hdr-name{font-size:15px;font-weight:800;color:#111;line-height:1.2;}
.hdr-status{font-size:12px;color:#4caf7d;font-weight:600;display:flex;align-items:center;gap:4px;}
.hdr-dot{width:5px;height:5px;border-radius:50%;background:#4caf7d;animation:dp 1.6s ease-in-out infinite;}
@keyframes dp{0%,100%{opacity:1}50%{opacity:.3}}
.hdr-user{display:flex;align-items:center;gap:8px;}
.hdr-user img{width:30px;height:30px;border-radius:50%;object-fit:cover;border:2px solid #eee;}

/* FEED */
#feedWrap{flex:1;overflow-y:auto;padding:10px 0 24px;}
#feedInner{max-width:680px;margin:0 10px 0 auto; /* צמוד לימין */ padding:0 10px;display:flex;flex-direction:column;gap:3px;}

/* MESSAGE ROW */
.msg-row{display:flex;align-items:flex-start;justify-content:flex-start;gap:8px;padding:2px 0;animation:mi .3s cubic-bezier(.16,1,.3,1) both;direction:rtl;}
@keyframes mi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg-av{width:36px;height:36px;border-radius:50%;object-fit:cover;flex-shrink:0;margin-top:2px;}

/* BUBBLE */
.bubble{
  background:#fff;
  border-radius:4px 18px 18px 18px;
  padding:10px 14px 8px;
  max-width:82%;
  min-width:180px;
  box-shadow:0 1px 2px rgba(0,0,0,.10);
  position:relative;
}
.bubble.is-red{background:#fff9f9;border-right:3px solid #e02020;}
.bubble-sender{font-size:13px;font-weight:800;color:#e02020;margin-bottom:4px;}
.bubble-sender.news-sender{color:#1a56db;}
.bubble-text{font-size:15px;line-height:1.7;color:#111;white-space:pre-wrap;word-break:break-word; font-family: 'Heebo', 'Noto Color Emoji', sans-serif;}
.bubble-headline{font-size:16px;font-weight:800;color:#111;line-height:1.5;margin-bottom:4px;}
.bubble-img{margin-top:9px;border-radius:12px;overflow:hidden;}
.bubble-img img{width:100%;display:block;max-height:340px;object-fit:cover;}
.bubble-vid{margin-top:9px;}
.vid-btn{display:inline-flex;align-items:center;gap:6px;background:#1a56db;color:#fff;padding:7px 15px;border-radius:99px;font-size:13px;font-weight:700;text-decoration:none;}
.bubble-btns{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px;}
.lnk-btn{display:inline-flex;align-items:center;gap:5px;background:#f3f4f6;border-radius:99px;padding:6px 13px;font-size:13px;font-weight:600;color:#374151;text-decoration:none;}
.bubble-foot{display:flex;align-items:center;justify-content:flex-start;gap:10px;margin-top:5px;}
.bubble-time{font-size:11px;color:#aaa;font-weight:500;margin-right:auto;}

/* REACTIONS */
.rxn-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px;}
.rxn-chip{display:inline-flex;align-items:center;gap:3px;background:#f3f4f6;border:1.5px solid transparent;border-radius:99px;padding:2px 9px;font-size:13px;cursor:pointer;font-family:'Noto Color Emoji', sans-serif;}
.rxn-chip.mine{background:#eff6ff;border-color:#bfdbfe;}
.rxn-add-btn{background:none;border:none;cursor:pointer;font-size:15px;padding:2px 5px;color:#aaa; font-family:'Noto Color Emoji', sans-serif;}

/* EMOJI PICKER - פס צר בצד שמאל */
#emojiPicker{
  position:fixed;background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:8px;
  box-shadow:0 8px 32px rgba(0,0,0,.15);z-index:500;display:none;flex-direction:column; /* פס צר */
  gap:4px;width:50px; /* רוחב צר */
  max-height: 300px; overflow-y: auto;
}
#emojiPicker.show{display:flex;}
.ep-btn{background:none;border:none;font-size:22px;cursor:pointer;padding:4px;border-radius:8px;font-family:'Noto Color Emoji', sans-serif;}

/* COMMENTS PANEL - צד שמאל ונמוך */
#cpOverlay{position:fixed;inset:0;z-index:299;display:none;background:rgba(0,0,0,.1);}
#cpOverlay.show{display:block;}
#commentsPanel{
  position:fixed;top:65px; /* נמוך יותר מהסרגל */
  left:0; /* צד שמאל */
  width:340px;max-width:100vw;height:calc(100% - 65px);
  background:#fff;box-shadow:4px 0 24px rgba(0,0,0,.12);
  z-index:300;display:flex;flex-direction:column;
  transform:translateX(-100%); /* כניסה משמאל */
  transition:transform 0.3s cubic-bezier(.16,1,.3,1);
}
#commentsPanel.open{transform:translateX(0);}
.cp-hdr{padding:14px 16px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between;}
.cp-body{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:10px;}
.cp-inp-row{padding:10px 12px;border-top:1px solid #f0f0f0;display:flex;gap:8px;align-items:flex-end;}
.cp-inp{flex:1;border:1.5px solid #e5e7eb;border-radius:12px;padding:8px 12px;font-size:14px;font-family:'Heebo',sans-serif;resize:none;outline:none;}
.cp-send{background:#1a56db;color:#fff;border:none;border-radius:10px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;}

/* SCROLL DOWN */
#scrollDownBtn{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#fff;border:1.5px solid #e5e7eb;border-radius:99px;padding:7px 16px;font-size:13px;font-weight:700;display:none;align-items:center;gap:6px;box-shadow:0 4px 18px rgba(0,0,0,.11);z-index:50;}
#scrollDownBtn.show{display:flex;}

#prog{position:fixed;top:0;inset-inline:0;height:2px;background:#1a56db;transform:scaleX(0);z-index:999;display:none;}
#prog.on{display:block;animation:pr 1.1s ease-in-out infinite;}
@keyframes pr{0%{transform:scaleX(0);transform-origin:right}50%{transform:scaleX(.55);transform-origin:right}100%{transform:scaleX(0);transform-origin:left}}

@media(max-width:480px){
  #commentsPanel{width:100vw;}
}
</style>
</head>
<body>
<div id="prog"></div>

<div id="loginScreen">
  <div class="login-card">
    <img class="login-logo-img" src="https://i.postimg.cc/zvyWy8wk/צילום_מסך_2026_03_01_031615.png">
    <div class="login-title">שאגת הארי</div>
    <div class="login-sub">כניסה לצוות העריכה</div>
    <div id="googleBtn"></div>
    <div class="login-err" id="loginErr">אינך מורשה לצפייה בפיד.</div>
  </div>
</div>

<div id="app">
  <header id="mainHdr">
    <img class="hdr-avatar" src="https://i.postimg.cc/zvyWy8wk/צילום_מסך_2026_03_01_031615.png">
    <div class="hdr-info">
      <div class="hdr-name">שאגת הארי</div>
      <div class="hdr-status"><div class="hdr-dot"></div>מחובר · עדכונים חיים</div>
    </div>
    <div class="hdr-user"><div id="userAvatar"></div></div>
  </header>

  <div id="feedWrap">
    <div id="feedInner"></div>
    <div id="empty" style="display:none;text-align:center;padding:60px;color:#aaa;"><i class="fas fa-satellite-dish"></i><p>ממתין לעדכונים...</p></div>
  </div>

  <button id="scrollDownBtn" onclick="scrollToBottom()">
    <span id="scrollDownTxt">למטה</span> <i class="fas fa-arrow-down"></i>
  </button>
</div>

<div id="emojiPicker">
  <button class="ep-btn" onclick="pickEmoji('👍')">👍</button>
  <button class="ep-btn" onclick="pickEmoji('❤️')">❤️</button>
  <button class="ep-btn" onclick="pickEmoji('🔥')">🔥</button>
  <button class="ep-btn" onclick="pickEmoji('😂')">😂</button>
  <button class="ep-btn" onclick="pickEmoji('😮')">😮</button>
  <button class="ep-btn" onclick="pickEmoji('😢')">😢</button>
  <button class="ep-btn" onclick="pickEmoji('🚨')">🚨</button>
  <button class="ep-btn" onclick="pickEmoji('✅')">✅</button>
</div>

<div id="cpOverlay" onclick="closeComments()"></div>
<div id="commentsPanel">
  <div class="cp-hdr">
    <span class="cp-title">💬 תגובות</span>
    <button style="background:none;border:none;cursor:pointer;color:#aaa;" onclick="closeComments()"><i class="fas fa-times"></i></button>
  </div>
  <div class="cp-body" id="cpBody"></div>
  <div class="cp-inp-row">
    <textarea class="cp-inp" id="cpInp" placeholder="כתוב תגובה..." rows="1"></textarea>
    <button class="cp-send" onclick="sendComment()"><i class="fas fa-paper-plane"></i></button>
  </div>
</div>

<script>
const BACKEND='https://dhoc97909.pythonanywhere.com';
const GOOGLE_CLIENT_ID='856723702772-jm929ihp29ovhribfaaph17pbaq6qr3n.apps.googleusercontent.com';
const LOGO='https://i.postimg.cc/zvyWy8wk/צילום_מסך_2026_03_01_031615.png';
const ADMIN_EMAIL = 'david@hamakom.ovh';

let me=null, items=[], lastTs=0, newCount=0, atBottom=true, activePicker=null, activeCmtMsgId=null;
let rxnCache={}, cmtCount={};

function esc(t){return(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function rich(t){
  if(!t)return'';
  let s=esc(t).replace(/\n/g,'<br>');
  s=s.replace(/\*([^*\n]+)\*/g,'<strong>$1</strong>');
  s=s.replace(/(https?:\/\/[^\s<>"']+)/g,'<a href="$1" target="_blank">$1</a>');
  return s;
}

function initGoogle(){
  google.accounts.id.initialize({client_id:GOOGLE_CLIENT_ID,callback:handleLogin});
  google.accounts.id.renderButton(document.getElementById('googleBtn'),{theme:'outline',size:'large',locale:'he',width:240});
  const savedUser = localStorage.getItem('lion_user');
  if(savedUser){ me = JSON.parse(savedUser); showApp(); }
}

async function handleLogin(resp){
  let payload=JSON.parse(atob(resp.credential.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
  const email=payload.email.toLowerCase();
  try {
    const r=await fetch(BACKEND+'/auth_check',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email})});
    const d=await r.json();
    if(!d.allowed){document.getElementById('loginErr').style.display='block';return;}
  } catch(e){return;}
  me={email,name:payload.name,picture:payload.picture};
  localStorage.setItem('lion_user', JSON.stringify(me));
  showApp();
}

function showApp(){
  document.getElementById('userAvatar').innerHTML=me.picture?`<img src="${me.picture}" style="width:30px;height:30px;border-radius:50%">`:`<div style="width:30px;height:30px;border-radius:50%;background:#1a56db;color:#fff;display:flex;align-items:center;justify-content:center">${me.name[0]}</div>`;
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('app').style.display='flex';
  loadFeed();
}

function buildMsg(e){
  const red=e.profile==='red';
  const id=e.id;
  const n=cmtCount[id]||0;
  return `<div class="msg-row" data-id="${id}">
    <img class="msg-av" src="${LOGO}">
    <div class="bubble${red?' is-red':''}">
      <div class="bubble-sender ${red?'':'news-sender'}">${red?'🚨 שאגת הארי':'📰 שאגת הארי'}</div>
      <div class="bubble-text">${red?`<strong>${esc(e.text.split('\n')[0])}</strong><br>`+rich(e.text.split('\n').slice(1).join('\n')):rich(e.text)}</div>
      ${e.imgUrl?`<div class="bubble-img"><img src="${e.imgUrl}"></div>`:''}
      <div class="rxn-row" id="rxn-${id}"><button class="rxn-add-btn" onclick="openPicker(event,'${id}')">😊</button></div>
      <div class="bubble-foot">
        <span class="bubble-time">${e.time||''}</span>
        <button class="cmt-btn" id="cbtn-${id}" onclick="openComments('${id}')"><i class="fas fa-comment"></i> ${n>0?n+' תגובות':'תגובות'}</button>
      </div>
    </div>
  </div>`;
}

function openPicker(e,msgId){
  e.stopPropagation();
  activePicker=msgId;
  const p=document.getElementById('emojiPicker');
  const r=e.currentTarget.getBoundingClientRect();
  p.style.top=(r.top < 100 ? 100 : r.top - 50)+'px';
  p.style.left='20px'; /* צד שמאל */
  p.classList.toggle('show');
}
function pickEmoji(em){
  document.getElementById('emojiPicker').classList.remove('show');
  if(activePicker) doReact(activePicker,em);
}
document.addEventListener('click',()=>document.getElementById('emojiPicker').classList.remove('show'));

async function doReact(msgId,emoji){
  const r=await fetch(BACKEND+'/feed_react',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:me.email,msgId,emoji})});
  const d=await r.json();
  if(d.status==='ok') renderRxn(msgId,d.reactions);
}

function renderRxn(msgId,rxns){
  const bar=document.getElementById('rxn-'+msgId); if(!bar)return;
  bar.innerHTML='';
  Object.entries(rxns).forEach(([emoji,users])=>{
    const c=document.createElement('button');
    c.className='rxn-chip'+(users.includes(me.email)?' mine':'');
    c.innerHTML=`${emoji} <span>${users.length}</span>`;
    c.onclick=()=>doReact(msgId,emoji);
    bar.appendChild(c);
  });
  const b=document.createElement('button'); b.className='rxn-add-btn'; b.textContent='😊'; b.onclick=(e)=>openPicker(e,msgId); bar.appendChild(b);
}

function openComments(msgId){
  activeCmtMsgId=msgId;
  document.getElementById('commentsPanel').classList.add('open');
  document.getElementById('cpOverlay').classList.add('show');
  loadComments(msgId);
}
function closeComments(){
  document.getElementById('commentsPanel').classList.remove('open');
  document.getElementById('cpOverlay').classList.remove('show');
}

async function loadComments(msgId){
  const b=document.getElementById('cpBody'); b.innerHTML='טוען...';
  const r=await fetch(BACKEND+'/feed_comments?msgId='+encodeURIComponent(msgId));
  const d=await r.json();
  const list=d.comments||[];
  cmtCount[msgId]=list.length;
  b.innerHTML=list.length?list.map(c=>`<div class="ci" style="display:flex;gap:8px;margin-bottom:10px">
    <div class="ci-bubble" style="background:#f3f4f6;padding:8px;border-radius:10px;flex:1;position:relative">
      <div style="font-size:11px;font-weight:800">${esc(c.name)}</div>
      <div style="font-size:13px">${esc(c.text)}</div>
      ${(me.email===ADMIN_EMAIL || c.email===me.email)?`<button onclick="delCmt('${msgId}','${c.id}')" style="position:absolute;top:5px;left:5px;background:none;border:none;color:#ccc;cursor:pointer">×</button>`:''}
    </div>
  </div>`).join(''):'אין תגובות';
}

async function sendComment(){
  const inp=document.getElementById('cpInp'); if(!inp.value.trim())return;
  await fetch(BACKEND+'/feed_comment_add',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:me.email,name:me.name,picture:me.picture,msgId:activeCmtMsgId,text:inp.value})});
  inp.value=''; loadComments(activeCmtMsgId);
}

async function delCmt(msgId,commentId){
  await fetch(BACKEND+'/feed_comment_delete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:me.email,msgId,commentId})});
  loadComments(msgId);
}

async function loadFeed(){
  const r=await fetch(BACKEND+'/feed');
  const d=await r.json();
  if(d.status==='ok'){
    items=[...d.feed].reverse();
    lastTs=items.length?Math.max(...items.map(e=>e.ts||0)):0;
    document.getElementById('feedInner').innerHTML=items.map(buildMsg).join('');
    items.forEach(e=>loadRxn(e.id));
    scrollToBottom();
  }
}

async function loadRxn(msgId){
  const r=await fetch(BACKEND+'/feed_reactions?msgId='+encodeURIComponent(msgId));
  const d=await r.json(); if(d.status==='ok') renderRxn(msgId,d.reactions);
}

function scrollToBottom(){ document.getElementById('feedWrap').scrollTop=999999; }
function setLoading(v){document.getElementById('prog').classList.toggle('on',v);}

window.addEventListener('load',initGoogle);
setInterval(async ()=>{
  if(!lastTs || !me) return;
  const r=await fetch(BACKEND+'/feed?since='+lastTs);
  const d=await r.json();
  if(d.status==='ok' && d.feed.length){
    d.feed.forEach(e=>{
      const div=document.createElement('div'); div.innerHTML=buildMsg(e);
      document.getElementById('feedInner').appendChild(div.firstChild);
      loadRxn(e.id);
    });
    lastTs=Math.max(...d.feed.map(x=>x.ts));
    if(atBottom) scrollToBottom();
  }
},6000);
</script>
</body>
</html>
