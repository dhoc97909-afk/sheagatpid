<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>שאגת הארי — עדכונים</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@300;400;500;700;900&family=Assistant:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{
  --red:#c8102e;
  --red-light:#fef0f2;
  --red-mid:#fbd0d7;
  --blue:#0f3460;
  --blue-light:#eef2f8;
  --ink:#0d0d0d;
  --ink2:#2c2c2c;
  --ink3:#5c5c6e;
  --rule:#e2e2e8;
  --bg:#f5f5f2;
  --white:#ffffff;
  --shadow:0 2px 12px rgba(0,0,0,.07),0 1px 3px rgba(0,0,0,.05);
  --shadow-hover:0 10px 48px rgba(0,0,0,.14),0 2px 8px rgba(0,0,0,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Assistant',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;}

/* MASTHEAD */
.masthead{background:var(--white);border-bottom:1px solid var(--rule);position:sticky;top:0;z-index:200;}
.masthead-inner{max-width:760px;margin:0 auto;padding:0 20px;height:70px;display:flex;align-items:center;justify-content:space-between;}
.brand{text-decoration:none;display:flex;flex-direction:column;line-height:1;}
.brand-he{font-family:'Frank Ruhl Libre',serif;font-size:30px;font-weight:900;color:var(--ink);letter-spacing:-.025em;}
.brand-tagline{font-size:10px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--ink3);margin-top:3px;}
.live-badge{display:flex;align-items:center;gap:7px;background:var(--red);color:#fff;padding:6px 15px;border-radius:4px;font-size:11px;font-weight:900;letter-spacing:.1em;}
.pulse{width:6px;height:6px;border-radius:50%;background:#fff;animation:p 1.5s ease-in-out infinite;}
@keyframes p{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.masthead-stripe{height:4px;background:linear-gradient(90deg,var(--red) 0%,#8b0015 40%,var(--blue) 100%);}

/* DATELINE */
.dateline{max-width:760px;margin:0 auto;padding:9px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--rule);}
.dateline-date{font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--ink3);text-transform:uppercase;}
.dateline-count{font-size:11px;color:var(--ink3);font-weight:600;}

/* MAIN */
main{max-width:760px;margin:0 auto;padding:30px 16px 100px;}

/* CARD */
.card{background:var(--white);border-radius:10px;box-shadow:var(--shadow);overflow:hidden;margin-bottom:18px;transition:box-shadow .25s,transform .2s;animation:ci .45s cubic-bezier(.16,1,.3,1) both;position:relative;}
.card:hover{box-shadow:var(--shadow-hover);transform:translateY(-2px);}
@keyframes ci{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.card:nth-child(1){animation-delay:.03s}.card:nth-child(2){animation-delay:.07s}.card:nth-child(3){animation-delay:.11s}.card:nth-child(4){animation-delay:.15s}.card:nth-child(5){animation-delay:.19s}
.card.is-red{border-top:4px solid var(--red);}
.card.is-news{border-top:4px solid var(--blue);}

.card-body{padding:24px 26px 18px;}

/* category */
.cat{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;padding:3px 10px;border-radius:3px;margin-bottom:14px;}
.cat.red{background:var(--red-light);color:var(--red);}
.cat.news{background:var(--blue-light);color:var(--blue);}

/* breaking banner */
.breaking{background:var(--red);color:#fff;padding:12px 18px;margin-bottom:0;display:flex;align-items:flex-start;gap:10px;line-height:1.5;}
.breaking-tag{background:rgba(255,255,255,.2);font-size:9px;font-weight:900;letter-spacing:.15em;padding:2px 8px;border-radius:2px;white-space:nowrap;margin-top:2px;flex-shrink:0;}
.breaking-text{font-family:'Frank Ruhl Libre',serif;font-size:21px;font-weight:700;line-height:1.4;}

/* headline */
.headline{font-family:'Frank Ruhl Libre',serif;font-size:23px;font-weight:700;line-height:1.45;color:var(--ink);margin-bottom:10px;letter-spacing:-.01em;}
.headline.long{font-size:20px;}

/* body */
.body{font-size:15.5px;line-height:1.8;color:var(--ink2);white-space:pre-wrap;word-break:break-word;}
.body a{color:var(--red);text-decoration:underline;text-decoration-color:var(--red-mid);}
.body a:hover{text-decoration-color:var(--red);}
.body strong{font-weight:800;color:var(--ink);}
.body em{font-style:italic;}

/* media */
.card-img{margin-top:18px;border-radius:7px;overflow:hidden;border:1px solid var(--rule);}
.card-img img{width:100%;display:block;max-height:400px;object-fit:cover;}
.card-vid{margin-top:16px;}
.vid-btn{display:inline-flex;align-items:center;gap:9px;background:var(--blue);color:#fff;padding:10px 22px;border-radius:5px;font-size:13px;font-weight:800;text-decoration:none;transition:background .15s,transform .1s;letter-spacing:.02em;}
.vid-btn:hover{background:#0a2540;transform:translateY(-1px);}
.card-btns{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px;}
.lnk-btn{display:inline-flex;align-items:center;gap:7px;background:#fafaf8;border:1.5px solid var(--rule);border-radius:5px;padding:7px 16px;font-size:13px;font-weight:700;color:var(--ink2);text-decoration:none;transition:border-color .15s,background .15s;}
.lnk-btn:hover{border-color:#bbb;background:#f5f5f0;}

/* footer */
.card-foot{padding:10px 26px 14px;border-top:1px solid #f0f0ec;display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--ink3);font-weight:600;}
.card-foot i{font-size:9px;opacity:.45;}

/* empty */
#empty{text-align:center;padding:100px 20px;display:none;}
.empty-word{font-family:'Frank Ruhl Libre',serif;font-size:58px;font-weight:900;color:var(--ink);opacity:.07;display:block;margin-bottom:16px;letter-spacing:-.04em;}
#empty p{color:var(--ink3);font-size:15px;}

/* progress */
#prog{position:fixed;top:0;inset-inline:0;height:3px;background:var(--red);transform:scaleX(0);transform-origin:right;z-index:999;display:none;}
#prog.on{display:block;animation:pr 1.1s ease-in-out infinite;}
@keyframes pr{0%{transform:scaleX(0);transform-origin:right}50%{transform:scaleX(.55);transform-origin:right}100%{transform:scaleX(0);transform-origin:left}}

/* toast */
#toast{position:fixed;top:84px;left:50%;transform:translateX(-50%) translateY(-10px);background:var(--red);color:#fff;padding:9px 22px;border-radius:5px;font-size:13px;font-weight:900;letter-spacing:.03em;box-shadow:0 8px 32px rgba(200,16,46,.3);cursor:pointer;display:none;opacity:0;transition:opacity .25s,transform .25s;z-index:300;border:none;font-family:'Assistant',sans-serif;}
#toast.on{display:flex;align-items:center;gap:8px;opacity:1;transform:translateX(-50%) translateY(0);}

/* back to top */
#top-btn{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;border:none;border-radius:5px;padding:10px 24px;font-size:11px;font-weight:900;letter-spacing:.08em;cursor:pointer;display:none;transition:background .15s;box-shadow:0 4px 20px rgba(0,0,0,.18);font-family:'Assistant',sans-serif;}
#top-btn:hover{background:var(--red);}
#top-btn.on{display:flex;align-items:center;gap:7px;}

@media(max-width:580px){
  .brand-he{font-size:24px;}.masthead-inner{height:58px;}.card-body{padding:16px 16px 12px;}.breaking{padding:10px 14px;}.breaking-text{font-size:18px;}.headline{font-size:19px;}.card-foot{padding:9px 16px 12px;}
}
</style>
</head>
<body>
<div id="prog"></div>

<div class="masthead">
  <div class="masthead-inner">
    <a class="brand" href="#">
      <span class="brand-he">שאגת הארי</span>
      <span class="brand-tagline">Live News Feed</span>
    </a>
    <div class="live-badge"><div class="pulse"></div>LIVE</div>
  </div>
  <div class="masthead-stripe"></div>
</div>

<div class="dateline">
  <span class="dateline-date" id="dl"></span>
  <span class="dateline-count" id="cnt"></span>
</div>

<main>
  <div id="feed"></div>
  <div id="empty">
    <span class="empty-word">שאגת הארי</span>
    <p>ממתין לעדכונים...</p>
  </div>
</main>

<button id="toast" onclick="applyPending()">
  <i class="fas fa-arrow-up" style="font-size:10px"></i>
  <span id="toast-txt">עדכון חדש</span>
</button>
<button id="top-btn" onclick="window.scrollTo({top:0,behavior:'smooth'})">
  <i class="fas fa-arrow-up" style="font-size:10px"></i> SCROLL TOP
</button>

<script>
const BACKEND='https://dhoc97909.pythonanywhere.com';
let items=[],lastTs=0,pending=[],atTop=true;

function esc(t){return(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function rich(t){
  if(!t)return'';
  let s=t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  s=s.replace(/\*([^*\n]+)\*/g,'<strong>$1</strong>');
  s=s.replace(/_([^_\n]+)_/g,'<em>$1</em>');
  s=s.replace(/(https?:\/\/[^\s<>"']+)/g,'<a href="$1" target="_blank" rel="noopener">$1</a>');
  return s;
}
function timeLabel(e){
  const today=new Date().toLocaleDateString('he-IL',{day:'2-digit',month:'2-digit',year:'numeric'});
  return(e.date&&e.date!==today)?e.date+' · '+e.time:(e.time||'');
}

function buildCard(e){
  const red=e.profile==='red';
  const lines=(e.text||'').trim().split('\n');
  const h=lines[0]||'';
  const body=lines.slice(1).join('\n').trim();
  const long=h.length>55;

  let top='';
  if(red){
    top=`<div class="breaking"><span class="breaking-tag">BREAKING</span><span class="breaking-text">${esc(h)}</span></div>`;
  } else {
    top=`<div class="card-body-head"><div class="cat news"><i class="fas fa-bolt"></i> מבזק חדשות</div><div class="headline${long?' long':''}">${esc(h)}</div></div>`;
  }

  let media='';
  if(e.imgUrl) media+=`<div class="card-img"><img src="${esc(e.imgUrl)}" loading="lazy" onerror="this.closest('.card-img').remove()"></div>`;
  if(e.videoUrl) media+=`<div class="card-vid"><a class="vid-btn" href="${esc(e.videoUrl)}" target="_blank" rel="noopener"><i class="fas fa-play"></i> צפייה בסרטון</a></div>`;

  let btns='';
  if(e.buttons&&e.buttons.length) btns='<div class="card-btns">'+e.buttons.map(b=>`<a class="lnk-btn" href="${esc(b.url)}" target="_blank"><i class="fas fa-link" style="font-size:9px;opacity:.4"></i>${esc(b.text)}</a>`).join('')+'</div>';

  const bodySection=body?`<div class="body">${rich(body)}</div>`:'';

  if(red){
    return `<article class="card is-red">
      ${top}
      ${(body||media||btns)?`<div class="card-body"><div class="cat red"><i class="fas fa-circle-exclamation"></i> צבע אדום</div>${bodySection}${media}${btns}</div>`:''}
      <div class="card-foot"><i class="fas fa-clock"></i><span>${timeLabel(e)}</span></div>
    </article>`;
  } else {
    return `<article class="card is-news">
      ${top}
      ${(body||media||btns)?`<div class="card-body" style="padding-top:0">${bodySection}${media}${btns}</div>`:''}
      <div class="card-foot"><i class="fas fa-clock"></i><span>${timeLabel(e)}</span></div>
    </article>`;
  }
}

function setCount(){document.getElementById('cnt').textContent=items.length?items.length+' עדכונים':'';}

function renderAll(){
  const f=document.getElementById('feed');
  document.getElementById('empty').style.display=items.length?'none':'block';
  f.innerHTML=items.map(buildCard).join('');
  setCount();
}

function prepend(ni){
  document.getElementById('empty').style.display='none';
  const f=document.getElementById('feed');
  const div=document.createElement('div');
  div.innerHTML=ni.map(buildCard).join('');
  while(div.firstChild) f.insertBefore(div.firstChild,f.firstChild);
  setCount();
}

async function loadFeed(){
  setLoading(true);
  try{
    const r=await fetch(BACKEND+'/feed');
    const d=await r.json();
    if(d.status==='ok'){items=d.feed||[];lastTs=items.length?Math.max(...items.map(e=>e.ts||0)):0;renderAll();}
  }catch(e){}
  setLoading(false);
}

async function pollNew(){
  if(!lastTs)return;
  try{
    const r=await fetch(BACKEND+'/feed?since='+lastTs);
    const d=await r.json();
    if(d.status==='ok'&&d.feed?.length){
      const ni=d.feed;
      lastTs=Math.max(...ni.map(e=>e.ts||0),lastTs);
      items=[...ni,...items].slice(0,200);
      if(atTop)prepend(ni);
      else{pending=[...ni,...pending];showToast();}
    }
  }catch(e){}
}

function showToast(){
  document.getElementById('toast-txt').textContent=pending.length===1?'עדכון חדש':pending.length+' עדכונים חדשים';
  document.getElementById('toast').classList.add('on');
}

function applyPending(){
  pending=[];document.getElementById('toast').classList.remove('on');
  renderAll();window.scrollTo({top:0,behavior:'smooth'});
}

function setLoading(v){document.getElementById('prog').classList.toggle('on',v);}

window.addEventListener('scroll',()=>{
  atTop=window.scrollY<100;
  document.getElementById('top-btn').classList.toggle('on',window.scrollY>400);
  if(atTop){document.getElementById('toast').classList.remove('on');if(pending.length){pending=[];renderAll();}}
},{passive:true});

function updateDL(){
  const now=new Date();
  const days=['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
  document.getElementById('dl').textContent='יום '+days[now.getDay()]+' · '+now.toLocaleDateString('he-IL',{day:'numeric',month:'long',year:'numeric'});
}
updateDL();setInterval(updateDL,60000);
loadFeed();setInterval(pollNew,6000);
</script>
</body>
</html>
