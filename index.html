<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>שאגת הארי</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    :root {
      --primary-color: #1877f2;
      --accent-color:  #d90000;
      --bg:            #f0f2f5;
      --chat-bg:       #ffffff;
      --bubble-bg:     #ffffff;
      --bubble-r:      12px;
      --av-size:       40px;
      --shadow:        0 1px 4px rgba(0,0,0,.15);
      --highlight:     #ff9800;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Assistant', sans-serif;
      -webkit-font-smoothing: antialiased;
      background: var(--bg);
      direction: rtl;
      text-align: right;
      overflow-x: hidden;
    }

    /* ── SPINNER ── */
    .spinner {
      border: 3px solid rgba(0,0,0,.1);
      border-top-color: var(--primary-color);
      border-radius: 50%;
      width: 16px; height: 16px;
      animation: spin 1s linear infinite;
      display: inline-block; vertical-align: middle;
      margin-inline-end: 5px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── PROGRESS BAR ── */
    #prog {
      position: fixed; top: 0; inset-inline: 0;
      height: 2px; background: var(--primary-color);
      transform: scaleX(0); transform-origin: right;
      z-index: 999; display: none;
    }
    #prog.on {
      display: block;
      animation: pr 1.1s ease-in-out infinite;
    }
    @keyframes pr {
      0%   { transform: scaleX(0);   transform-origin: right; }
      50%  { transform: scaleX(.55); transform-origin: right; }
      100% { transform: scaleX(0);   transform-origin: left;  }
    }

    /* ── LOGIN ── */
    #loginScreen {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
    }
    .login-card {
      background: #fff; border-radius: 18px; padding: 38px 32px;
      text-align: center; box-shadow: 0 4px 32px rgba(0,0,0,.12);
      max-width: 320px; width: 90%;
    }
    .login-logo { width: 72px; height: 72px; border-radius: 50%; margin: 0 auto 14px; display: block; object-fit: cover; }
    .login-title { font-size: 20px; font-weight: 900; color: #111; margin-bottom: 4px; }
    .login-sub   { font-size: 13px; color: #888; margin-bottom: 24px; }
    .login-err   { font-size: 12px; color: #e02020; margin-top: 10px; display: none; font-weight: 600; }

    /* ── APP WRAPPER ── */
    #app { display: none; flex-direction: column; min-height: 100vh; }

    /* ── TOP BAR ── */
    .top-bar-wrapper {
      background: var(--chat-bg);
      border-bottom: 1px solid #e0e0e0;
      box-shadow: 0 2px 4px rgba(0,0,0,.08);
      position: sticky; top: 0; z-index: 120;
    }
    .top-bar {
      display: flex; align-items: center;
      padding: 1px 20px;
      direction: ltr;
    }
    .top-bar .logo {
      height: 55px; order: 5;
      margin-inline-start: 15px;
      direction: rtl; border-radius: 50%;
    }
    .top-bar .text-content {
      order: 4; flex-grow: 1;
      text-align: right; direction: rtl;
    }
    .top-bar .main-title {
      font-size: 1.4em; font-weight: 800;
      color: var(--accent-color); margin: 0;
    }
    .top-bar .sub-title  { font-size: .9em; color: #777; font-weight: 600; margin-top: 2px; }
    .top-bar .user-info  { font-size: .8em; color: var(--primary-color); font-weight: 700; margin-top: 4px; display: flex; align-items: center; gap: 6px; }

    /* Bell */
    .notification-bell {
      order: 2; background: none; border: none; cursor: pointer;
      padding: 8px; margin-inline-end: 10px; border-radius: 50%;
      transition: background .2s;
      display: flex; align-items: center; justify-content: center;
    }
    .notification-bell:hover { background: #f0f0f0; }
    .notification-bell svg { width: 24px; height: 24px; fill: #555; transition: fill .2s; }
    .notification-bell.active svg { fill: var(--primary-color); }

    /* Google button */
    .google-signin-container { order: 1; margin-inline-end: 10px; }
    .google-signin-btn {
      background: none; border: none; cursor: pointer; padding: 0;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      width: 40px; height: 40px;
    }
    .google-signin-btn img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #ddd; }

    /* ── FEED ── */
    .main-container { width: 100%; flex-grow: 1; }

    .message-feed {
      max-width: 1000px;
      margin: 3px 80px 10px 80px;
      padding: 20px 70px 30px 40px;
      display: flex; flex-direction: column;
      gap: 20px;
      box-sizing: border-box;
      align-items: flex-start;
    }

    /* ── MESSAGE CONTAINER ── */
    .message-container {
      display: flex; flex-direction: column; position: relative;
      max-width: 90%; align-self: flex-start;
      padding-top: calc(var(--av-size)/2 - 5px);
      min-height: var(--av-size);
      transition: all .2s ease-out;
    }
    .message-container.highlighted {
      background: #fffde7;
      border: 2px solid var(--highlight);
      border-radius: 16px;
      padding: 20px 10px 10px;
      box-shadow: 0 0 10px rgba(255,152,0,.5);
    }

    /* ── MESSAGE HEADER ── */
    .message-header {
      display: flex; align-items: center; gap: 6px;
      padding: 0 0 4px;
      align-self: flex-start; direction: rtl;
      margin-inline-start: 15px;
      position: absolute; top: 0; right: 0; z-index: 6;
      background: transparent; flex-wrap: nowrap;
    }
    .message-header strong { font-size: .95em; font-weight: 800; color: #555; white-space: nowrap; }
    .message-header small  { font-size: .7em;  color: #999; white-space: nowrap; }

    /* Action buttons — appear on hover */
    .message-actions { display: flex; gap: 2px; align-items: center; opacity: 0; transition: opacity .2s; }
    .message-container:hover .message-actions { opacity: 1; }
    .action-btn {
      background: rgba(255,255,255,.95); border: 1px solid #e0e0e0;
      cursor: pointer; padding: 6px 8px; color: #555;
      transition: all .2s; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      gap: 4px; font-size: .75em; font-weight: 600;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
      font-family: 'Assistant', sans-serif;
    }
    .action-btn:hover {
      background: #f5f5f5; border-color: #ccc;
      transform: translateY(-1px); box-shadow: 0 2px 6px rgba(0,0,0,.12);
    }
    .action-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; }

    /* ── AVATAR ── */
    .message-container .avatar {
      position: absolute;
      top: 15px;
      right: calc(-1 * var(--av-size) - 10px);
      width: var(--av-size); height: var(--av-size);
      border-radius: 50%;
      border: 3px solid var(--chat-bg);
      z-index: 5;
      box-shadow: 0 2px 6px rgba(0,0,0,.25);
    }

    /* ── BUBBLE ── */
    .message {
      background: var(--bubble-bg);
      border-radius: var(--bubble-r);
      box-shadow: var(--shadow);
      padding: 0;
      display: inline-flex; flex-direction: column;
      max-width: 100%; width: fit-content;
      margin-top: calc(var(--av-size)/2 - 15px);
      margin-inline-start: 10px;
    }
    .message.is-red {
      background: #fff9f9;
      border-right: 3px solid var(--accent-color);
    }

    /* Sender label */
    .bubble-sender       { font-size: 13px; font-weight: 800; color: var(--accent-color); margin-bottom: 4px; }
    .bubble-sender.news  { color: var(--primary-color); }

    /* Text */
    .message-content-wrapper { padding: 10px 14px; }
    .message-text-bubble {
      white-space: pre-wrap; font-size: 1.1em; line-height: 1.5;
      color: #111; word-break: break-word;
    }
    .message-text-bubble strong { font-weight: 800; }
    .message-text-bubble em     { font-style: italic; }
    .message-text-bubble a      { color: var(--primary-color); text-decoration: underline; }

    /* Red headline */
    .bubble-headline {
      font-size: 16px; font-weight: 800; color: #111;
      line-height: 1.5; margin-bottom: 4px;
    }

    /* Media */
    .media-container {
      width: fit-content; max-width: 100%;
      padding: 0 10px 10px;
      display: flex; justify-content: center; align-items: center;
    }
    .media-container img,
    .media-container video {
      max-width: 450px; max-height: 350px;
      border-radius: 14px; box-shadow: 0 2px 8px rgba(0,0,0,.2); cursor: pointer;
    }

    /* Video button */
    .vid-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--primary-color); color: #fff;
      padding: 7px 15px; border-radius: 99px;
      font-size: 13px; font-weight: 700; text-decoration: none;
      margin: 0 10px 10px;
    }

    /* Link buttons */
    .bubble-btns { display: flex; flex-wrap: wrap; gap: 6px; padding: 0 10px 10px; }
    .lnk-btn {
      display: inline-flex; align-items: center; gap: 5px;
      background: #f3f4f6; border-radius: 99px;
      padding: 6px 13px; font-size: 13px; font-weight: 600;
      color: #374151; text-decoration: none; border: none;
    }

    /* ── REACTION HOVER BOX ── */
    .reaction-hover-box {
      display: none;
      position: absolute; top: -30px; right: 10px;
      background: #fff; border: 1px solid #d8d8d8;
      border-radius: 10px; padding: 2px 4px;
      box-shadow: 0 2px 6px rgba(0,0,0,.1);
      z-index: 100;
      opacity: 0; transform: translateY(4px);
      pointer-events: none;
      transition: opacity .15s ease, transform .15s ease;
    }
    .message-container:hover .reaction-hover-box {
      display: flex; opacity: 1; transform: translateY(0);
      pointer-events: all;
    }
    .reaction-hover-box span {
      font-size: 18px; margin: 1px 2px; cursor: pointer;
      transition: transform .1s ease;
    }
    .reaction-hover-box span:hover { transform: scale(1.3); }

    /* ── REACTION CHIPS ── */
    .rxn-row {
      display: flex; flex-wrap: wrap;
      padding: 4px 8px 8px; gap: 4px;
      justify-content: flex-end;
    }
    .emoji-reaction {
      display: inline-flex; align-items: center;
      background: #fff; border-radius: 12px;
      padding: 3px 8px; cursor: pointer;
      box-shadow: 0 1px 2px rgba(0,0,0,.1);
      border: 1px solid #d9d9d9;
    }
    .emoji-reaction:hover { background: #f5f5f5; }
    .emoji-reaction .emoji { font-size: 1em; margin-inline-end: 4px; }
    .emoji-reaction .count { font-size: .8em; font-weight: 600; color: #333; }
    .emoji-reaction.reacted { border-color: var(--primary-color); background: #e3f2fd; }

    .rxn-add-btn {
      background: none; border: none; cursor: pointer;
      font-size: 15px; padding: 2px 5px;
      border-radius: 99px; line-height: 1;
      transition: background .12s; color: #aaa;
    }
    .rxn-add-btn:hover { background: #f3f4f6; }

    /* ── BUBBLE FOOTER ── */
    .bubble-foot {
      display: flex; align-items: center;
      justify-content: flex-start; gap: 10px;
      padding: 0 14px 8px; margin-top: 2px;
    }
    .bubble-time { font-size: 11px; color: #aaa; font-weight: 500; margin-right: auto; }
    .cmt-btn {
      display: inline-flex; align-items: center; gap: 4px;
      background: none; border: none; font-size: 12px; color: #aaa;
      cursor: pointer; font-family: 'Assistant', sans-serif; font-weight: 600;
      padding: 0; transition: color .12s;
    }
    .cmt-btn:hover, .cmt-btn.has-cmt { color: var(--primary-color); }

    /* ── UNREAD DIVIDER ── */
    .unread-divider { display: flex; align-items: center; margin: 20px 0; width: 100%; }
    .unread-divider::before,
    .unread-divider::after { content: ''; flex: 1; height: 2px; background: linear-gradient(to right, transparent, var(--accent-color), transparent); }
    .unread-divider-text {
      padding: 4px 16px; background: var(--accent-color); color: white;
      font-size: .85em; font-weight: 700; border-radius: 12px;
      margin: 0 12px; white-space: nowrap;
    }

    /* ── NEW MESSAGES BADGE ── */
    #newMessagesBadge {
      position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
      background: var(--accent-color); color: white;
      padding: 8px 16px; border-radius: 20px;
      font-size: .9em; font-weight: 700;
      box-shadow: 0 4px 12px rgba(217,0,0,.4);
      display: none; align-items: center; gap: 8px;
      cursor: pointer; z-index: 98;
      animation: pulse 2s infinite;
    }
    #newMessagesBadge.show { display: flex; }
    @keyframes pulse {
      0%,100% { transform: translateX(-50%) scale(1); }
      50%      { transform: translateX(-50%) scale(1.05); }
    }
    #newMessagesBadge .badge-count {
      background: white; color: var(--accent-color);
      width: 24px; height: 24px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .85em; font-weight: 800;
    }

    /* ── SCROLL DOWN BUTTON ── */
    #scrollDownBtn {
      position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
      background: #fff; border: 1.5px solid #e5e7eb; border-radius: 99px;
      padding: 7px 16px; font-size: 13px; font-weight: 700; color: #374151;
      cursor: pointer; display: none; align-items: center; gap: 6px;
      box-shadow: 0 4px 18px rgba(0,0,0,.11);
      font-family: 'Assistant', sans-serif; z-index: 50;
    }
    #scrollDownBtn.show { display: flex; }

    /* ── TOAST ── */
    #toastContainer {
      position: fixed; bottom: 20px; right: 20px;
      z-index: 1002; display: flex; flex-direction: column; gap: 10px;
    }
    .toast {
      background: rgba(50,50,50,.95); color: #fff;
      padding: 12px 20px; border-radius: 8px;
      box-shadow: 0 4px 12px rgba(0,0,0,.3);
      max-width: 300px; opacity: 0;
      transform: translateX(100%); transition: opacity .3s, transform .3s;
      direction: rtl; cursor: pointer;
      border-right: 4px solid var(--primary-color);
      font-family: 'Assistant', sans-serif; font-size: 14px;
    }
    .toast.show { opacity: 1; transform: translateX(0); }
    .toast.err  { border-right-color: var(--accent-color); }

    /* ── FULLSCREEN MODAL ── */
    #fullscreenModal {
      position: fixed; inset: 0; background: rgba(0,0,0,.95);
      z-index: 9999; display: none; justify-content: center; align-items: center; cursor: zoom-out;
    }
    #fullscreenModal.show { display: flex; }
    #fullscreenModal img,
    #fullscreenModal video { max-width: 95vw; max-height: 95vh; object-fit: contain; box-shadow: 0 0 50px rgba(0,0,0,.5); }
    .fs-close {
      position: absolute; top: 20px; right: 20px;
      background: rgba(255,255,255,.9); border: none; font-size: 32px; color: #333;
      cursor: pointer; width: 50px; height: 50px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; transition: all .2s;
    }
    .fs-close:hover { background: white; transform: scale(1.1); }

    /* ── COMMENTS PANEL ── */
    #cpOverlay {
      position: fixed; inset: 0; z-index: 299; display: none; background: rgba(0,0,0,.3);
    }
    #cpOverlay.show { display: block; }

    #commentsPanel {
      position: fixed; top: 0; left: 0;
      height: 100%; width: 340px; max-width: 100vw;
      background: #fff; box-shadow: 6px 0 20px rgba(0,0,0,.12);
      z-index: 300; display: flex; flex-direction: column;
      transform: translateX(-100%);
      transition: transform .3s cubic-bezier(.16,1,.3,1);
    }
    #commentsPanel.open { transform: translateX(0); }

    .cp-hdr {
      padding: 14px 16px; border-bottom: 1px solid #f0f0f0;
      display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
    }
    .cp-title { font-size: 15px; font-weight: 800; color: #111; }
    .cp-close {
      background: none; border: none; font-size: 17px; cursor: pointer;
      color: #aaa; padding: 4px; border-radius: 8px;
    }
    .cp-close:hover { background: #f3f4f6; }

    .cp-body { flex: 1; overflow-y: auto; padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; }

    .ci { display: flex; gap: 8px; animation: ci-in .22s ease; }
    @keyframes ci-in { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

    .ci-av   { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
    .ci-av-i {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--primary-color); color: #fff;
      font-size: 11px; font-weight: 800;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .ci-bubble {
      background: #f3f4f6; border-radius: 0 12px 12px 12px;
      padding: 7px 11px; flex: 1; position: relative;
    }
    .ci-name { font-size: 11px; font-weight: 800; color: #111; margin-bottom: 2px; }
    .ci-text { font-size: 13px; line-height: 1.6; color: #374151; word-break: break-word; }
    .ci-time { font-size: 10px; color: #aaa; margin-top: 3px; }
    .ci-del {
      position: absolute; top: 5px; left: 8px;
      background: none; border: none; font-size: 11px; color: #ccc;
      cursor: pointer; opacity: 0; transition: opacity .12s;
    }
    .ci-bubble:hover .ci-del { opacity: 1; }

    .no-cmt { text-align: center; color: #aaa; font-size: 13px; padding: 30px 0; }

    .cp-inp-row {
      padding: 10px 12px; border-top: 1px solid #f0f0f0;
      display: flex; gap: 8px; align-items: flex-end; flex-shrink: 0;
    }
    .cp-inp {
      flex: 1; border: 1.5px solid #e5e7eb; border-radius: 12px;
      padding: 8px 12px; font-size: 14px; font-family: 'Assistant', sans-serif;
      resize: none; outline: none; max-height: 80px; line-height: 1.5;
    }
    .cp-inp:focus { border-color: #93c5fd; }
    .cp-send {
      background: var(--primary-color); color: #fff; border: none;
      border-radius: 10px; width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
    }

    /* ── EMOJI PICKER ── */
    #emojiPicker {
      position: fixed;
      background: #fff; border: 1px solid #e5e7eb; border-radius: 16px; padding: 10px;
      box-shadow: 0 8px 32px rgba(0,0,0,.15); z-index: 500;
      display: none; flex-wrap: wrap; gap: 4px;
      width: 226px;
      max-height: calc(100vh - 56px - 20px); overflow-y: auto;
    }
    #emojiPicker.show { display: flex; }
    .ep-btn { background: none; border: none; font-size: 21px; cursor: pointer; padding: 4px 5px; border-radius: 8px; line-height: 1; }
    .ep-btn:hover { background: #f3f4f6; }

    /* ── EMPTY ── */
    #empty { display: none; text-align: center; padding: 60px 20px; color: #aaa; }
    #empty i { font-size: 36px; opacity: .2; margin-bottom: 10px; display: block; }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .message-feed { margin: 10px 0; padding: 10px 55px 30px 10px; }
      .media-container img, .media-container video { max-width: 260px; }
      #commentsPanel { width: 100vw; }
    }
  </style>
</head>
<body>

<div id="prog"></div>

<!-- FULLSCREEN -->
<div id="fullscreenModal" onclick="closeFullscreen()">
  <button class="fs-close" onclick="closeFullscreen();event.stopPropagation()">×</button>
  <div id="fsContent"></div>
</div>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <img class="login-logo" src="https://i.postimg.cc/zvyWy8wk/צילום_מסך_2026_03_01_031615.png" onerror="this.style.display='none'">
    <div class="login-title">שאגת הארי</div>
    <div class="login-sub">כניסה לצוות העריכה</div>
    <div id="googleBtn"></div>
    <div class="login-err" id="loginErr">אינך מורשה לצפייה בפיד.</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="top-bar-wrapper">
    <div class="top-bar">
      <div class="google-signin-container">
        <button id="googleSignInBtn" class="google-signin-btn">
          <div style="width:40px;height:40px;border-radius:50%;background:white;border:2px solid #ddd;display:flex;align-items:center;justify-content:center;font-weight:700;color:#555">G</div>
        </button>
      </div>
      <button id="notificationBell" class="notification-bell" onclick="toggleNotifications()" title="התראות">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5S10.5 3.17 10.5 4v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/>
        </svg>
      </button>
      <img src="https://i.postimg.cc/zvyWy8wk/צילום_מסך_2026_03_01_031615.png" alt="לוגו" class="logo" onerror="this.style.display='none'">
      <div class="text-content">
        <div class="main-title">שאגת הארי 🦁</div>

<script>
// ── CONSTANTS ──────────────────────────────────────────────
const BACKEND          = 'https://dhoc97909.pythonanywhere.com';
const GOOGLE_CLIENT_ID = '856723702772-jm929ihp29ovhribfaaph17pbaq6qr3n.apps.googleusercontent.com';
const LOGO_NEWS        = 'https://i.postimg.cc/zvyWy8wk/צילום_מסך_2026_03_01_031615.png';
const LOGO_RED         = 'https://i.postimg.cc/ncKKRgq9/image.png';
const ADMIN_EMAIL      = 'david@hamakom.ovh';
const STORAGE_KEY      = 'shaagat_hari_user';
const REACT_EMOJIS     = ['😂','🤣','❤️','🔥','👍','🙏','🤯','☝️','🤭','😜','🤩','🥳','💥','💯','😊','🥰','🙄','🎯'];

// ── STATE ──────────────────────────────────────────────────
let me              = null;
let items           = [];
let lastTs          = 0;
let newCount        = 0;
let atBottom        = true;
let activePicker    = null;
let activeCmtMsgId  = null;
let rxnCache        = {};
let cmtCount        = {};
let notifEnabled    = localStorage.getItem('notificationsEnabled') === 'true';

// ── UTILS ──────────────────────────────────────────────────
function esc(t) {
  return (t || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function rich(t) {
  if (!t) return '';
  let s = t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  s = s.replace(/\*([^*\n]+)\*/g, '<strong>$1</strong>');
  s = s.replace(/_([^_\n]+)_/g,   '<em>$1</em>');
  s = s.replace(/(https?:\/\/[^\s<>"']+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
  return s;
}
function timeLabel(e) {
  const today = new Date().toLocaleDateString('he-IL', {day:'2-digit',month:'2-digit',year:'numeric'});
  return (e.date && e.date !== today) ? e.date + ' ' + e.time : (e.time || '');
}

// ── TOAST ──────────────────────────────────────────────────
function showToast(msg, isErr) {
  const t = document.createElement('div');
  t.className = 'toast' + (isErr ? ' err' : '');
  t.textContent = msg;
  document.getElementById('toastContainer').appendChild(t);
  setTimeout(() => t.classList.add('show'), 10);
  const h = setTimeout(() => { t.classList.remove('show'); t.addEventListener('transitionend', () => t.remove()); }, 4000);
  t.onclick = () => { clearTimeout(h); t.classList.remove('show'); t.addEventListener('transitionend', () => t.remove()); };
}

// ── AUTH (doc 2 logic) ─────────────────────────────────────
function saveUser(u)   { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(u)); } catch(e) {} }
function loadSaved()   { try { const r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : null; } catch(e) { return null; } }
function clearSaved()  { try { localStorage.removeItem(STORAGE_KEY); } catch(e) {} }

async function verifyAndLogin(user) {
  try {
    const r = await fetch(BACKEND + '/auth_check', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({email: user.email})
    });
    const d = await r.json();
    if (!d.allowed) {
      clearSaved();
      document.getElementById('loginErr').style.display = 'block';
      return false;
    }
  } catch(e) { /* allow if server unreachable */ }
  me = user;
  saveUser(user);
  applyLogin();
  return true;
}

function applyLogin() {
  // user avatar in top bar
  const ui = document.getElementById('userInfo');
  ui.innerHTML = me.picture
    ? `<img src="${esc(me.picture)}" style="width:26px;height:26px;border-radius:50%;object-fit:cover;border:2px solid #eee"> <span>${esc(me.name)}</span>`
    : `<div style="width:26px;height:26px;border-radius:50%;background:var(--primary-color);color:#fff;font-size:11px;font-weight:800;display:inline-flex;align-items:center;justify-content:center">${(me.name[0]||'?').toUpperCase()}</div> <span>${esc(me.name)}</span>`;

  // update google button
  const gb = document.getElementById('googleSignInBtn');
  if (me.picture) {
    gb.innerHTML = `<img src="${esc(me.picture)}" alt="${esc(me.name)}">`;
  }
  gb.onclick = () => {
    if (confirm('להתנתק?')) {
      me = null; clearSaved();
      showToast('👋 התנתקת');
      gb.innerHTML = '<div style="width:40px;height:40px;border-radius:50%;background:white;border:2px solid #ddd;display:flex;align-items:center;justify-content:center;font-weight:700;color:#555">G</div>';
      gb.onclick = () => google.accounts.id.prompt();
      document.getElementById('userInfo').innerHTML = '';
    }
  };

  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display         = 'flex';
  loadFeed();
}

function initGoogle() {
  google.accounts.id.initialize({
    client_id:   GOOGLE_CLIENT_ID,
    callback:    handleLogin,
    auto_select: true
  });

  const saved = loadSaved();
  if (saved) { verifyAndLogin(saved); return; }

  google.accounts.id.renderButton(document.getElementById('googleBtn'), {
    theme: 'outline', size: 'large', locale: 'he', width: 240
  });
  google.accounts.id.prompt();
}

async function handleLogin(resp) {
  let payload = {};
  try { payload = JSON.parse(atob(resp.credential.split('.')[1].replace(/-/g,'+').replace(/_/g,'/'))); } catch(e) {}
  const email = (payload.email || '').toLowerCase();
  const user  = {email, name: payload.name || email.split('@')[0], picture: payload.picture || ''};
  await verifyAndLogin(user);
}

// ── BUILD MESSAGE (doc 4 style) ────────────────────────────
function buildMsg(e) {
  const red = e.profile === 'red';
  const id  = e.id;

  // Text
  const lines = (e.text || '').trim().split('\n');
  const h     = lines[0] || '';
  const body  = lines.slice(1).join('\n').trim();

  let content = '';
  if (red) {
    content  = `<div class="bubble-headline">🚨 ${esc(h)}</div>`;
    if (body) content += `<div class="message-text-bubble" style="margin-top:4px">${rich(body)}</div>`;
  } else {
    content = `<div class="message-text-bubble">${rich(h + (body ? '\n' + body : ''))}</div>`;
  }

  // Media
  let media = '';
  if (e.imgUrl) {
    media += `<div class="media-container">
      <img src="${esc(e.imgUrl)}" loading="lazy"
           onclick="openFullscreen('${esc(e.imgUrl)}','image')"
           onerror="this.closest('.media-container').remove()">
    </div>`;
  }
  if (e.videoUrl) {
    media += `<div style="padding:0 10px 10px">
      <a class="vid-btn" href="${esc(e.videoUrl)}" target="_blank">
        <i class="fas fa-play" style="font-size:10px"></i> צפה בסרטון
      </a>
    </div>`;
  }

  // Custom buttons
  let btns = '';
  if (e.buttons && e.buttons.length) {
    btns = `<div class="bubble-btns">${e.buttons.map(b =>
      `<a class="lnk-btn" href="${esc(b.url)}" target="_blank">${esc(b.text)}</a>`
    ).join('')}</div>`;
  }

  const n      = cmtCount[id] || 0;
  const hasCmt = n > 0;
  const avatar = red ? LOGO_RED : LOGO_NEWS;

  // Hover reaction bar
  const hoverBar = `<div class="reaction-hover-box">${REACT_EMOJIS.map(em =>
    `<span onclick="doReact('${id}','${em}')">${em}</span>`
  ).join('')}</div>`;

  return `<div class="message-container" data-id="${id}">
    <div class="message-header">
      <strong>${red ? '🚨 שאגת הארי' : '📰 שאגת הארי'}</strong>
      <small>${timeLabel(e)}</small>
      <div class="message-actions">
        <button class="action-btn" title="תגובות" onclick="openComments('${id}')">
          <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          ${hasCmt ? n : ''}
        </button>
      </div>
    </div>
    ${hoverBar}
    <div class="message${red ? ' is-red' : ''}">
      <div class="message-content-wrapper">
        <div class="bubble-sender${red ? '' : ' news'}">${red ? '🚨 שאגת הארי' : '📰 שאגת הארי'}</div>
        ${content}
      </div>
      ${media}
      ${btns}
      <div class="rxn-row" id="rxn-${id}">
        <button class="rxn-add-btn" onclick="openPicker(event,'${id}')">😊</button>
      </div>
      <div class="bubble-foot">
        <span class="bubble-time">${timeLabel(e)}</span>
        <button class="cmt-btn${hasCmt ? ' has-cmt' : ''}" id="cbtn-${id}" onclick="openComments('${id}')">
          <i class="fas fa-comment" style="font-size:10px"></i>
          ${hasCmt ? n + ' תגובות' : 'תגובות'}
        </button>
      </div>
    </div>
    <img class="avatar" src="${avatar}" onerror="this.src='${LOGO_NEWS}'">
  </div>`;
}

// ── REACTIONS ──────────────────────────────────────────────
function renderRxn(msgId, rxns) {
  rxnCache[msgId] = rxns;
  const bar = document.getElementById('rxn-' + msgId);
  if (!bar) return;
  bar.innerHTML = '';

  Object.entries(rxns).forEach(([emoji, users]) => {
    if (!users.length) return;
    const mine = users.includes(me?.email);
    const c = document.createElement('button');
    c.className = 'emoji-reaction' + (mine ? ' reacted' : '');
    c.innerHTML = `<span class="emoji">${emoji}</span><span class="count">${users.length}</span>`;
    c.onclick    = () => doReact(msgId, emoji);
    bar.appendChild(c);
  });

  const add = document.createElement('button');
  add.className = 'rxn-add-btn';
  add.textContent = '😊';
  add.onclick = (e) => openPicker(e, msgId);
  bar.appendChild(add);
}

// ── EMOJI PICKER ───────────────────────────────────────────
function openPicker(e, msgId) {
  e.stopPropagation();
  activePicker = msgId;
  const p = document.getElementById('emojiPicker');
  p.classList.remove('show');

  // measure
  p.style.visibility = 'hidden'; p.style.display = 'flex';
  const pH = p.offsetHeight, pW = p.offsetWidth;
  p.style.display = ''; p.style.visibility = '';

  const r = e.currentTarget.getBoundingClientRect();
  const HEADER = 56, MARGIN = 8;

  let top  = r.top - pH - MARGIN;
  if (top < HEADER + MARGIN) top = r.bottom + MARGIN;
  top = Math.max(HEADER + MARGIN, top);

  let left = r.left - pW - MARGIN;
  if (left < MARGIN) left = MARGIN;

  p.style.top  = top  + 'px';
  p.style.left = left + 'px';
  p.style.right = 'auto';
  p.classList.toggle('show');
}

function pickEmoji(em) {
  document.getElementById('emojiPicker').classList.remove('show');
  if (activePicker) doReact(activePicker, em);
  activePicker = null;
}
document.addEventListener('click', () => document.getElementById('emojiPicker').classList.remove('show'));

async function doReact(msgId, emoji) {
  if (!me) { showToast('יש להתחבר כדי להגיב', true); return; }
  try {
    const r = await fetch(BACKEND + '/feed_react', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({email: me.email, msgId, emoji})
    });
    const d = await r.json();
    if (d.status === 'ok') renderRxn(msgId, d.reactions);
  } catch(e) {}
}

// ── COMMENTS ───────────────────────────────────────────────
function openComments(msgId) {
  activeCmtMsgId = msgId;
  document.getElementById('commentsPanel').classList.add('open');
  document.getElementById('cpOverlay').classList.add('show');
  loadComments(msgId);
}
function closeComments() {
  document.getElementById('commentsPanel').classList.remove('open');
  document.getElementById('cpOverlay').classList.remove('show');
  activeCmtMsgId = null;
}

async function loadComments(msgId) {
  const b = document.getElementById('cpBody');
  b.innerHTML = '<div style="text-align:center;padding:20px;color:#aaa;font-size:13px">טוען...</div>';
  try {
    const r = await fetch(BACKEND + '/feed_comments?msgId=' + encodeURIComponent(msgId));
    const d = await r.json();
    const list = d.comments || [];
    cmtCount[msgId] = list.length;
    updateCmtBtn(msgId, list.length);
    b.innerHTML = list.length
      ? list.map(c => buildCmt(msgId, c)).join('')
      : '<div class="no-cmt">עדיין אין תגובות</div>';
  } catch(e) {
    b.innerHTML = '<div class="no-cmt">שגיאה בטעינה</div>';
  }
}

function buildCmt(msgId, c) {
  const canDel = (me?.email === ADMIN_EMAIL) || (c.email === me?.email);
  const av = c.picture
    ? `<img class="ci-av" src="${esc(c.picture)}" onerror="this.style.display='none'">`
    : `<div class="ci-av-i">${(c.name || '?')[0].toUpperCase()}</div>`;
  return `<div class="ci" id="ci-${c.id}">
    ${av}
    <div class="ci-bubble">
      <div class="ci-name">${esc(c.name || c.email)}</div>
      <div class="ci-text">${esc(c.text)}</div>
      <div class="ci-time">${c.time || ''}</div>
      ${canDel ? `<button class="ci-del" onclick="delCmt('${msgId}','${c.id}')">✕</button>` : ''}
    </div>
  </div>`;
}

function updateCmtBtn(msgId, n) {
  const btn = document.getElementById('cbtn-' + msgId);
  if (!btn) return;
  btn.className = 'cmt-btn' + (n > 0 ? ' has-cmt' : '');
  btn.innerHTML = `<i class="fas fa-comment" style="font-size:10px"></i> ${n > 0 ? n + ' תגובות' : 'תגובות'}`;

  // also update action button
  const act = document.querySelector(`[data-id="${msgId}"] .action-btn`);
  if (act) act.innerHTML = `<svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg> ${n > 0 ? n : ''}`;
}

async function sendComment() {
  const inp  = document.getElementById('cpInp');
  const text = inp.value.trim();
  if (!text || !me || !activeCmtMsgId) return;
  inp.value = ''; inp.style.height = 'auto';
  try {
    const r = await fetch(BACKEND + '/feed_comment_add', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({email: me.email, name: me.name, picture: me.picture, msgId: activeCmtMsgId, text})
    });
    const d = await r.json();
    if (d.status === 'ok') {
      const b = document.getElementById('cpBody');
      b.querySelector('.no-cmt')?.remove();
      const div = document.createElement('div');
      div.innerHTML = buildCmt(activeCmtMsgId, d.comment);
      b.appendChild(div.firstChild);
      b.scrollTop = b.scrollHeight;
      cmtCount[activeCmtMsgId] = (cmtCount[activeCmtMsgId] || 0) + 1;
      updateCmtBtn(activeCmtMsgId, cmtCount[activeCmtMsgId]);
    }
  } catch(e) {}
}

async function delCmt(msgId, cid) {
  if (!me) return;
  try {
    const r = await fetch(BACKEND + '/feed_comment_delete', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({email: me.email, msgId, commentId: cid})
    });
    const d = await r.json();
    if (d.status === 'ok') {
      document.getElementById('ci-' + cid)?.remove();
      cmtCount[msgId] = Math.max(0, (cmtCount[msgId] || 1) - 1);
      updateCmtBtn(msgId, cmtCount[msgId]);
      if (!document.querySelector('#cpBody .ci'))
        document.getElementById('cpBody').innerHTML = '<div class="no-cmt">עדיין אין תגובות</div>';
    }
  } catch(e) {}
}

// ── FEED LOADING (doc 2 logic) ─────────────────────────────
function setLoading(v) { document.getElementById('prog').classList.toggle('on', v); }

async function loadFeed() {
  setLoading(true);
  try {
    const r = await fetch(BACKEND + '/feed');
    const d = await r.json();
    if (d.status === 'ok') {
      items  = [...d.feed].reverse();
      lastTs = items.length ? Math.max(...items.map(e => e.ts || 0)) : 0;
      const inner = document.getElementById('feedInner');
      inner.innerHTML = '';
      if (!items.length) {
        document.getElementById('empty').style.display = 'block';
      } else {
        document.getElementById('empty').style.display = 'none';
        inner.innerHTML = items.map(buildMsg).join('');
        items.forEach(e => loadRxn(e.id));
      }
      scrollToBottom();
    }
  } catch(e) {}
  setLoading(false);
}

async function loadRxn(msgId) {
  try {
    const r = await fetch(BACKEND + '/feed_reactions?msgId=' + encodeURIComponent(msgId));
    const d = await r.json();
    if (d.status === 'ok') renderRxn(msgId, d.reactions);
  } catch(e) {}
}

async function pollNew() {
  if (!lastTs || !me) return;
  try {
    const r = await fetch(BACKEND + '/feed?since=' + lastTs);
    const d = await r.json();
    if (d.status === 'ok' && d.feed?.length) {
      const ni = [...d.feed].reverse();
      lastTs = Math.max(...d.feed.map(e => e.ts || 0), lastTs);
      items  = [...items, ...ni];

      const inner = document.getElementById('feedInner');
      document.getElementById('empty').style.display = 'none';

      ni.forEach(e => {
        const div = document.createElement('div');
        div.innerHTML = buildMsg(e);
        inner.appendChild(div.firstChild);
        loadRxn(e.id);
      });

      if (atBottom) { scrollToBottom(); }
      else { newCount += ni.length; updateScrollBtn(); }
    }
  } catch(e) {}
}

// ── SCROLL ─────────────────────────────────────────────────
function scrollToBottom() {
  window.scrollTo({top: document.body.scrollHeight, behavior: 'smooth'});
  newCount = 0; atBottom = true; updateScrollBtn();
}
function updateScrollBtn() {
  const btn = document.getElementById('scrollDownBtn');
  const txt = document.getElementById('scrollDownTxt');
  const badge = document.getElementById('newMessagesBadge');
  if (!atBottom) {
    btn.classList.add('show');
    if (newCount > 0) {
      badge.classList.add('show');
      document.getElementById('badgeCount').textContent = newCount;
      txt.textContent = newCount + ' חדשות';
    } else {
      badge.classList.remove('show');
      txt.textContent = 'למטה';
    }
  } else {
    btn.classList.remove('show');
    badge.classList.remove('show');
    newCount = 0;
  }
}
window.addEventListener('scroll', () => {
  atBottom = (document.documentElement.scrollHeight - window.scrollY - window.innerHeight) < 80;
  updateScrollBtn();
});

// ── FULLSCREEN ─────────────────────────────────────────────
function openFullscreen(url, type) {
  const modal = document.getElementById('fullscreenModal');
  document.getElementById('fsContent').innerHTML = (type === 'image')
    ? `<img src="${url}" alt="תמונה">`
    : `<video controls autoplay src="${url}"></video>`;
  modal.classList.add('show');
  document.body.style.overflow = 'hidden';
}
function closeFullscreen() {
  document.getElementById('fullscreenModal').classList.remove('show');
  document.getElementById('fsContent').innerHTML = '';
  document.body.style.overflow = '';
}

// ── NOTIFICATIONS ──────────────────────────────────────────
async function toggleNotifications() {
  if (!('Notification' in window)) { showToast('הדפדפן לא תומך בהתראות', true); return; }
  const bell = document.getElementById('notificationBell');
  if (!notifEnabled) {
    const p = await Notification.requestPermission();
    if (p === 'granted') {
      notifEnabled = true;
      localStorage.setItem('notificationsEnabled', 'true');
      bell.classList.add('active');
      showToast('🔔 התראות הופעלו');
    } else { showToast('לא ניתן להפעיל התראות', true); }
  } else {
    notifEnabled = false;
    localStorage.setItem('notificationsEnabled', 'false');
    bell.classList.remove('active');
    showToast('🔕 התראות כובו');
  }
}

// ── INIT ───────────────────────────────────────────────────
window.addEventListener('load', () => {
  if (notifEnabled) document.getElementById('notificationBell').classList.add('active');

  function tryInit() {
    if (window.google?.accounts) { initGoogle(); }
    else { setTimeout(tryInit, 200); }
  }
  tryInit();
});

setInterval(pollNew, 6000);
</script>
