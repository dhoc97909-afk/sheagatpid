<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>שאגת הארי — עדכונים</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;scroll-behavior:smooth}
:root{
  --red:#e02020;
  --blue:#1a56db;
  --ink:#111827;
  --ink2:#374151;
  --ink3:#9ca3af;
  --rule:#e5e7eb;
  --bg:#f3f4f6;
  --white:#fff;
  --news-border:#1a56db;
  --red-border:#e02020;
  --unread-bg:#fff7ed;
  --unread-border:#fed7aa;
}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--ink);display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;}

/* ── HEADER ── */
header{
  background:var(--white);
  border-bottom:1px solid var(--rule);
  position:sticky;top:0;z-index:100;
  padding:0 16px;
  height:58px;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
  box-shadow:0 1px 4px rgba(0,0,0,.06);
}
.brand{font-size:20px;font-weight:900;color:var(--ink);letter-spacing:-.03em;}
.brand span{color:var(--red);}
.live-pill{display:flex;align-items:center;gap:6px;background:var(--red);color:#fff;padding:4px 12px;border-radius:99px;font-size:11px;font-weight:800;letter-spacing:.06em;}
.dot-pulse{width:6px;height:6px;border-radius:50%;background:#fff;animation:dp 1.5s ease-in-out infinite;}
@keyframes dp{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.65)}}

/* ── FEED AREA ── */
#feedWrap{
  flex:1;
  overflow-y:auto;
  padding:16px 0 24px;
  display:flex;
  flex-direction:column;
  scroll-behavior:smooth;
}
#feedInner{
  max-width:680px;
  width:100%;
  margin:0 auto;
  padding:0 12px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* ── UNREAD DIVIDER ── */
.unread-divider{
  display:flex;align-items:center;gap:10px;
  margin:4px 0;
  font-size:12px;font-weight:700;
  color:#d97706;
  animation:fadeIn .4s ease;
}
.unread-divider::before,.unread-divider::after{content:'';flex:1;height:1px;background:var(--unread-border);}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* ── MESSAGE CARD ── */
.msg{
  background:var(--white);
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
  animation:msgIn .35s cubic-bezier(.16,1,.3,1) both;
  transition:box-shadow .2s;
}
.msg:hover{box-shadow:0 4px 20px rgba(0,0,0,.1);}
@keyframes msgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.msg.unread{background:var(--unread-bg);}
.msg.is-red{border-right:4px solid var(--red);}
.msg.is-news{border-right:4px solid var(--blue);}

/* breaking header */
.msg-breaking{
  background:var(--red);
  color:#fff;
  padding:10px 16px;
  display:flex;align-items:center;gap:10px;
  font-size:13px;font-weight:800;
  letter-spacing:.04em;
}
.break-tag{background:rgba(255,255,255,.22);font-size:9px;font-weight:900;letter-spacing:.15em;padding:2px 8px;border-radius:3px;white-space:nowrap;text-transform:uppercase;}

/* body */
.msg-body{padding:14px 16px 12px;}
.msg-cat{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;padding:2px 9px;border-radius:3px;margin-bottom:10px;}
.msg-cat.news{background:#eff6ff;color:var(--blue);}
.msg-cat.red{background:#fef2f2;color:var(--red);}
.msg-text{font-size:15px;line-height:1.75;color:var(--ink2);white-space:pre-wrap;word-break:break-word;}
.msg-text strong{font-weight:800;color:var(--ink);}
.msg-text em{font-style:italic;}
.msg-text a{color:var(--blue);text-decoration:underline;}

/* media */
.msg-img{margin-top:12px;border-radius:10px;overflow:hidden;border:1px solid var(--rule);}
.msg-img img{width:100%;display:block;max-height:380px;object-fit:cover;}
.msg-vid{margin-top:12px;}
.vid-btn{display:inline-flex;align-items:center;gap:7px;background:var(--blue);color:#fff;padding:8px 18px;border-radius:8px;font-size:13px;font-weight:700;text-decoration:none;transition:background .15s;}
.vid-btn:hover{background:#1345b7;}
.msg-btns{display:flex;flex-wrap:wrap;gap:7px;margin-top:12px;}
.lnk-btn{display:inline-flex;align-items:center;gap:6px;background:#f9fafb;border:1.5px solid var(--rule);border-radius:8px;padding:6px 14px;font-size:13px;font-weight:600;color:var(--ink2);text-decoration:none;transition:border-color .15s;}
.lnk-btn:hover{border-color:#9ca3af;}

/* footer */
.msg-foot{padding:7px 16px 10px;display:flex;align-items:center;gap:6px;font-size:11px;color:var(--ink3);font-weight:500;border-top:1px solid #f3f4f6;}
.msg-foot i{font-size:9px;opacity:.5;}

/* ── EMPTY ── */
#empty{display:none;text-align:center;padding:80px 20px;color:var(--ink3);}
#empty i{font-size:40px;opacity:.2;margin-bottom:12px;display:block;}
#empty p{font-size:14px;}

/* ── SCROLL TO BOTTOM BTN ── */
#scrollDownBtn{
  position:fixed;
  bottom:24px;
  left:50%;
  transform:translateX(-50%);
  background:var(--white);
  border:1.5px solid var(--rule);
  border-radius:99px;
  padding:9px 20px;
  font-size:13px;font-weight:700;
  color:var(--ink2);
  cursor:pointer;
  display:none;
  align-items:center;gap:8px;
  box-shadow:0 4px 20px rgba(0,0,0,.12);
  transition:box-shadow .2s,transform .15s;
  font-family:'Heebo',sans-serif;
  z-index:50;
}
#scrollDownBtn:hover{box-shadow:0 8px 32px rgba(0,0,0,.16);transform:translateX(-50%) translateY(-2px);}
#scrollDownBtn.show{display:flex;}
.unread-dot{
  width:9px;height:9px;border-radius:50%;
  background:var(--red);
  box-shadow:0 0 0 2px #fff;
  flex-shrink:0;
  display:none;
}
#scrollDownBtn.has-unread .unread-dot{display:block;}

/* progress */
#prog{position:fixed;top:0;inset-inline:0;height:2px;background:var(--red);transform:scaleX(0);transform-origin:right;z-index:999;display:none;}
#prog.on{display:block;animation:pr 1.1s ease-in-out infinite;}
@keyframes pr{0%{transform:scaleX(0);transform-origin:right}50%{transform:scaleX(.55);transform-origin:right}100%{transform:scaleX(0);transform-origin:left}}

@media(max-width:480px){
  .msg-body{padding:12px 13px 10px;}
  .msg-text{font-size:14.5px;}
}
</style>
</head>
<body>
<div id="prog"></div>

<header>
  <span class="brand">שאגת <span>הארי</span></span>
  <div class="live-pill"><div class="dot-pulse"></div>LIVE</div>
</header>

<div id="feedWrap">
  <div id="feedInner"></div>
  <div id="empty"><i class="fas fa-satellite-dish"></i><p>ממתין לעדכונים...</p></div>
</div>

<button id="scrollDownBtn" onclick="scrollToBottom()">
  <div class="unread-dot"></div>
  <span id="scrollDownTxt">למטה</span>
  <i class="fas fa-arrow-down" style="font-size:11px"></i>
</button>

<script>
const BACKEND='https://dhoc97909.pythonanywhere.com';
let items=[], lastTs=0, unreadCount=0, atBottom=true, dividerInserted=false;

function esc(t){return(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function rich(t){
  if(!t)return'';
  let s=t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  s=s.replace(/\*([^*\n]+)\*/g,'<strong>$1</strong>');
  s=s.replace(/_([^_\n]+)_/g,'<em>$1</em>');
  s=s.replace(/(https?:\/\/[^\s<>"']+)/g,'<a href="$1" target="_blank" rel="noopener">$1</a>');
  return s;
}
function timeLabel(e){
  const today=new Date().toLocaleDateString('he-IL',{day:'2-digit',month:'2-digit',year:'numeric'});
  return(e.date&&e.date!==today)?e.date+' · '+(e.time||''):(e.time||'');
}

function buildMsg(e, isUnread=false){
  const red=e.profile==='red';
  const lines=(e.text||'').trim().split('\n');
  const h=lines[0]||'';
  const body=lines.slice(1).join('\n').trim();

  let topHtml='';
  if(red){
    topHtml=`<div class="msg-breaking"><span class="break-tag">🚨 Breaking</span><span>${esc(h)}</span></div>`;
  }

  let catHtml='';
  if(!red) catHtml=`<div class="msg-cat news"><i class="fas fa-bolt"></i> מבזק חדשות</div>`;
  else if(body) catHtml=`<div class="msg-cat red"><i class="fas fa-circle-exclamation"></i> צבע אדום</div>`;

  const mainText=red?(body?`<div class="msg-text">${rich(body)}</div>`:''): `<div class="msg-text">${rich((h+(body?'\n'+body:'')))||''}</div>`;

  let media='';
  if(e.imgUrl) media+=`<div class="msg-img"><img src="${esc(e.imgUrl)}" loading="lazy" onerror="this.closest('.msg-img').remove()"></div>`;
  if(e.videoUrl) media+=`<div class="msg-vid"><a class="vid-btn" href="${esc(e.videoUrl)}" target="_blank"><i class="fas fa-play" style="font-size:10px"></i> צפייה בסרטון</a></div>`;

  let btns='';
  if(e.buttons&&e.buttons.length) btns='<div class="msg-btns">'+e.buttons.map(b=>`<a class="lnk-btn" href="${esc(b.url)}" target="_blank"><i class="fas fa-link" style="font-size:9px;opacity:.4"></i>${esc(b.text)}</a>`).join('')+'</div>';

  const bodySection=(catHtml||mainText||media||btns)?`<div class="msg-body">${catHtml}${mainText}${media}${btns}</div>`:'';

  return `<div class="msg is-${red?'red':'news'}${isUnread?' unread':''}">
    ${topHtml}${bodySection}
    <div class="msg-foot"><i class="fas fa-clock"></i><span>${timeLabel(e)}</span></div>
  </div>`;
}

function insertUnreadDivider(){
  if(dividerInserted)return;
  dividerInserted=true;
  const d=document.createElement('div');
  d.className='unread-divider';d.id='unreadDivider';
  d.innerHTML='<span>הודעות שלא נקראו</span>';
  document.getElementById('feedInner').appendChild(d);
}

function removeUnreadDivider(){
  const d=document.getElementById('unreadDivider');
  if(d)d.remove();
  dividerInserted=false;
}

function appendMsgs(newItems, isUnread=false){
  const inner=document.getElementById('feedInner');
  document.getElementById('empty').style.display='none';
  if(isUnread&&newItems.length) insertUnreadDivider();
  newItems.forEach(e=>{
    const div=document.createElement('div');
    div.innerHTML=buildMsg(e,isUnread);
    inner.appendChild(div.firstChild);
  });
}

async function loadFeed(){
  setLoading(true);
  try{
    const r=await fetch(BACKEND+'/feed');
    const d=await r.json();
    if(d.status==='ok'){
      items=d.feed?[...d.feed].reverse():[];
      lastTs=items.length?Math.max(...items.map(e=>e.ts||0)):0;
      const inner=document.getElementById('feedInner');
      inner.innerHTML='';
      if(!items.length){document.getElementById('empty').style.display='block';}
      else{appendMsgs(items,false);}
      scrollToBottom(true);
    }
  }catch(e){}
  setLoading(false);
}

async function pollNew(){
  if(!lastTs)return;
  try{
    const r=await fetch(BACKEND+'/feed?since='+lastTs);
    const d=await r.json();
    if(d.status==='ok'&&d.feed?.length){
      const ni=[...d.feed].reverse();
      lastTs=Math.max(...d.feed.map(e=>e.ts||0),lastTs);
      items=[...items,...ni];
      if(atBottom){
        removeUnreadDivider();
        appendMsgs(ni,false);
        scrollToBottom(true);
      } else {
        unreadCount+=ni.length;
        appendMsgs(ni,true);
        updateScrollBtn();
      }
    }
  }catch(e){}
}

function scrollToBottom(instant=false){
  const wrap=document.getElementById('feedWrap');
  wrap.scrollTo({top:wrap.scrollHeight,behavior:instant?'auto':'smooth'});
}

function updateScrollBtn(){
  const btn=document.getElementById('scrollDownBtn');
  const txt=document.getElementById('scrollDownTxt');
  if(!atBottom){
    btn.classList.add('show');
    if(unreadCount>0){
      btn.classList.add('has-unread');
      txt.textContent=unreadCount+' הודעות חדשות';
    } else {
      btn.classList.remove('has-unread');
      txt.textContent='למטה';
    }
  } else {
    btn.classList.remove('show','has-unread');
    unreadCount=0;
    removeUnreadDivider();
  }
}

document.getElementById('feedWrap').addEventListener('scroll',function(){
  const wrap=this;
  const fromBottom=wrap.scrollHeight-wrap.scrollTop-wrap.clientHeight;
  atBottom=fromBottom<60;
  updateScrollBtn();
  if(atBottom){
    unreadCount=0;
    removeUnreadDivider();
    // Remove unread styling
    document.querySelectorAll('.msg.unread').forEach(m=>m.classList.remove('unread'));
  }
},{passive:true});

function setLoading(v){document.getElementById('prog').classList.toggle('on',v);}

loadFeed();
setInterval(pollNew,6000);
</script>
</body>
</html>
