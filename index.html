<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1"/>
<title>שאגת הארי</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&family=Noto+Color+Emoji&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{height:100%;}
body{height:100%;font-family:'Heebo',sans-serif;-webkit-font-smoothing:antialiased;background:#eae9e4;display:flex;flex-direction:row-reverse;}

/* LOGIN */
#loginScreen{position:fixed;inset:0;background:#eae9e4;display:flex;align-items:center;justify-content:center;z-index:1000;}
.login-card{background:#fff;border-radius:18px;padding:38px 32px;text-align:center;box-shadow:0 4px 32px rgba(0,0,0,.12);max-width:320px;width:90%;}
.login-logo-img{width:72px;height:72px;border-radius:50%;margin:0 auto 14px;display:block;object-fit:cover;}
.login-title{font-size:20px;font-weight:900;color:#111;margin-bottom:4px;}
.login-sub{font-size:13px;color:#888;margin-bottom:24px;}
.login-err{font-size:12px;color:#e02020;margin-top:10px;display:none;font-weight:600;}

/* APP */
#app{flex:1;min-width:0;height:100%;display:none;flex-direction:column;}

/* AD SIDEBAR */
#adSidebar{
  display:none;
  width:360px;min-width:360px;
  background:#fff;
  border-left:1px solid rgba(0,0,0,.08);
  flex-shrink:0;
  position:sticky;top:56px;height:calc(100vh - 56px);
  overflow-y:auto;overflow-x:hidden;
  scrollbar-width:none;
}
#adSidebar::-webkit-scrollbar{display:none;}
#adSidebar a{display:block;width:100%;}
#adSidebar img{width:100%;height:auto;display:block;}



@media(max-width:900px){
  #adSidebar{display:none!important;}
}

/* HEADER */
header{
  background:#fff;border-bottom:1px solid rgba(0,0,0,.08);
  height:56px;padding:0 14px;
  display:flex;align-items:center;gap:12px;
  flex-shrink:0;position:fixed;top:0;left:0;right:0;z-index:100;
  overflow:visible; /* מאפשר ל-popup לצאת */
}
/* פידפ מתחיל מתחת לסרגל הקבוע */
#app{padding-top:56px;}
.hdr-avatar{width:38px;height:38px;border-radius:50%;object-fit:cover;flex-shrink:0;}
.hdr-info{flex:1;min-width:0;}
.hdr-name{font-size:15px;font-weight:800;color:#111;line-height:1.2;}
.hdr-status{font-size:12px;color:#4caf7d;font-weight:600;display:flex;align-items:center;gap:4px;}
.hdr-dot{width:5px;height:5px;border-radius:50%;background:#4caf7d;animation:dp 1.6s ease-in-out infinite;}
@keyframes dp{0%,100%{opacity:1}50%{opacity:.3}}
.hdr-user{display:flex;align-items:center;gap:8px;}
.hdr-user img{width:30px;height:30px;border-radius:50%;object-fit:cover;border:2px solid #eee;}

#adminBadge{
  display:none;align-items:center;gap:4px;
  background:#f0f4ff;border:1px solid #c7d7fa;
  border-radius:8px;padding:2px 7px;
  font-size:11px;font-weight:700;color:#1a56db;
  white-space:nowrap;
}
#adminBadge.show{display:inline-flex;}
#adminBadge i{font-size:10px;opacity:.7;}

/* FEED */
#feedWrap{flex:1;overflow-y:auto;padding:10px 0 24px;scrollbar-width:none;}
#feedWrap::-webkit-scrollbar{display:none;}
#feedInner{max-width:780px;margin:0 60px 0 auto;padding:0 10px 0 20px;display:flex;flex-direction:column;gap:6px;}

@media(max-width:600px){
  #feedInner{margin:0;padding:0 8px;}
  .bubble{min-width:0;}
}

/* MESSAGE ROW */
.msg-row{
  display:flex;direction:rtl;
  align-items:flex-start;gap:8px;
  padding:2px 0;
  animation:mi .3s cubic-bezier(.16,1,.3,1) both;
}
@keyframes mi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.msg-av{
  width:36px;height:36px;border-radius:50%;object-fit:cover;
  flex-shrink:0;align-self:flex-start;
  margin-top:17px;
}

.msg-col{display:flex;flex-direction:column;gap:3px;min-width:0;align-items:flex-start;}
.msg-meta{
  direction:rtl;display:flex;align-items:baseline;gap:6px;
  padding-right:4px;
}
.msg-meta-name{font-size:12px;font-weight:700;color:#666;}
.msg-meta-time{font-size:11px;font-weight:500;color:#aaa;}

.bubble{
  background:#fff;direction:rtl;
  border-radius:18px 4px 18px 18px;
  padding:10px 14px 8px;
  display:inline-block;
  max-width:100%;min-width:180px;
  box-shadow:0 1px 2px rgba(0,0,0,.10);
}
.bubble.is-red{background:#fff9f9;border-right:3px solid #e02020;}

.bubble-text{font-size:17px;line-height:1.7;color:#111;white-space:pre-wrap;word-break:break-word;}
.bubble-text strong{font-weight:800;}
.bubble-text em{font-style:italic;}
.bubble-text a{color:#1a56db;text-decoration:underline;}
.bubble-headline{font-size:18px;font-weight:800;color:#111;line-height:1.5;margin-bottom:4px;}

.bubble-img{margin-top:9px;border-radius:12px;overflow:hidden;}
.bubble-img img{width:100%;display:block;max-height:480px;height:auto;object-fit:contain;object-position:top;}
.bubble-vid{margin-top:9px;}
.vid-btn{display:inline-flex;align-items:center;gap:6px;background:#1a56db;color:#fff;padding:7px 15px;border-radius:99px;font-size:13px;font-weight:700;text-decoration:none;}
.bubble-btns{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px;}
.lnk-btn{display:inline-flex;align-items:center;gap:5px;background:#f3f4f6;border-radius:99px;padding:6px 13px;font-size:13px;font-weight:600;color:#374151;text-decoration:none;border:none;}

.bubble-foot{
  display:flex;align-items:center;gap:5px;
  margin-top:2px;flex-wrap:wrap;
  padding-right:10px;
}

/* REACTIONS — מרובע כמו קודם, מתחת לבועה */
.rxn-row{display:contents;}
.rxn-chip{
  display:inline-flex;align-items:center;justify-content:center;gap:2px;
  background:#f3f4f6;border:1px solid #e5e7eb;
  border-radius:6px;
  padding:2px 5px;
  height:22px;
  cursor:pointer;transition:background .12s,border-color .12s,transform .1s;
  user-select:none;line-height:1;
}
.rxn-chip:hover{background:#e5e7eb;border-color:#d1d5db;transform:scale(1.08);}
.rxn-chip.mine{background:#eff6ff;border-color:#bfdbfe;}
.rxn-chip.mine:hover{background:#dbeafe;}
.rxn-emoji{font-size:12px;line-height:1;font-family:'Noto Color Emoji','Apple Color Emoji','Segoe UI Emoji',sans-serif;}
.rxn-count{font-size:10px;font-weight:700;color:#6b7280;font-family:'Heebo',sans-serif;}
.rxn-chip.mine .rxn-count{color:#1a56db;}

.rxn-add-btn{
  background:none;border:none;cursor:pointer;
  padding:1px;border-radius:6px;line-height:0;
  display:inline-flex;align-items:center;color:#ccc;
  transition:color .12s,background .12s,transform .12s;
  height:22px;width:22px;justify-content:center;
}
.rxn-add-btn:hover{color:#666;background:#f0f0f0;transform:scale(1.12);}
.rxn-add-btn svg{width:14px;height:14px;display:block;}
.rxn-add-btn.maxed{opacity:0.3;cursor:default;pointer-events:none;}

.cmt-btn{display:inline-flex;align-items:center;gap:4px;background:none;border:none;font-size:12px;color:#aaa;cursor:pointer;font-family:'Heebo',sans-serif;font-weight:600;padding:0;transition:color .12s;}
.cmt-btn:hover{color:#1a56db;}
.cmt-btn.has-cmt{color:#1a56db;}

/* EMOJI PICKER */
#emojiPicker{
  position:fixed;
  background:#fff;border:1px solid #e5e7eb;
  border-radius:14px;
  padding:8px;
  box-shadow:0 4px 16px rgba(0,0,0,.12);
  z-index:600;display:none;
  flex-wrap:wrap;
  width:254px;
  gap:2px;
  animation:pickerPop .14s ease-out;
}
@keyframes pickerPop{from{opacity:0;transform:scale(.95) translateY(4px)}to{opacity:1;transform:scale(1) translateY(0)}}
#emojiPicker.show{display:flex;}
.ep-btn{
  background:none;border:none;
  font-size:17px;cursor:pointer;
  padding:2px;border-radius:6px;line-height:1;flex-shrink:0;
  font-family:'Noto Color Emoji','Apple Color Emoji','Segoe UI Emoji',sans-serif;
  transition:background .1s,transform .1s;
  display:inline-flex;align-items:center;justify-content:center;
  width:28px;height:28px;
}
.ep-btn:hover{background:#f3f4f6;transform:scale(1.15);}
.ep-btn:active{transform:scale(.9);}

/* COMMENTS PANEL */
#cpOverlay{display:none;}
#commentsPanel{
  position:fixed;
  top:56px;left:0;right:auto;
  width:310px;max-width:100vw;
  height:calc(100% - 56px);
  background:#fff;
  box-shadow:4px 0 24px rgba(0,0,0,.12);
  z-index:300;display:flex;flex-direction:column;
  transform:translateX(-100%);
  transition:transform .3s cubic-bezier(.16,1,.3,1);
}
#commentsPanel.open{transform:translateX(0);}

.cp-hdr{padding:14px 16px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.cp-title{font-size:15px;font-weight:800;color:#111;}
.cp-close{background:none;border:none;font-size:17px;cursor:pointer;color:#aaa;padding:4px;border-radius:8px;}
.cp-close:hover{background:#f3f4f6;}
.cp-body{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:10px;}
.cp-spinner{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex:1;gap:10px;color:#bbb;font-size:12px;font-weight:600;padding:30px 0;
}
.cp-spinner-ring{
  width:28px;height:28px;border-radius:50%;
  border:2.5px solid #e5e7eb;border-top-color:#1a56db;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

.ci{display:flex;gap:8px;animation:cian .22s ease;}
@keyframes cian{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.ci-av{width:30px;height:30px;border-radius:50%;object-fit:cover;flex-shrink:0;align-self:flex-start;}
.ci-av-i{
  width:30px;height:30px;border-radius:50%;
  background:#1a56db;color:#fff;font-size:12px;font-weight:800;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;align-self:flex-start;
}
.ci-bubble{
  background:#f3f4f6;border-radius:4px 12px 12px 12px;
  padding:8px 12px;flex:1;position:relative;direction:rtl;
}
.ci-text{font-size:13px;line-height:1.6;color:#374151;word-break:break-word;}
.ci-time{font-size:10px;color:#aaa;margin-top:3px;}
.ci-del{
  position:absolute;top:6px;left:8px;
  background:none;border:none;font-size:11px;color:#ccc;
  cursor:pointer;opacity:0;transition:opacity .12s;
}
.ci-bubble:hover .ci-del{opacity:1;}
.no-cmt{text-align:center;color:#aaa;font-size:13px;padding:30px 0;}

.cp-inp-row{padding:10px 12px;border-top:1px solid #f0f0f0;display:flex;gap:8px;align-items:flex-end;flex-shrink:0;}
.cp-inp{flex:1;border:1.5px solid #e5e7eb;border-radius:12px;padding:8px 12px;font-size:14px;font-family:'Heebo',sans-serif;resize:none;outline:none;max-height:80px;line-height:1.5;direction:rtl;}
.cp-inp:focus{border-color:#93c5fd;}
.cp-send{background:#1a56db;color:#fff;border:none;border-radius:10px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}

/* HEADER ICON BUTTONS */
.hdr-user{display:flex;align-items:center;gap:4px;}
.hdr-icon-btn, #searchBtn, #darkBtn, #notifBtn, #adBtn, #adminPanelBtn {
  background:none;border:none;cursor:pointer;
  width:32px;height:32px;border-radius:8px;
  display:inline-flex;align-items:center;justify-content:center;
  color:#888;transition:background .15s,color .15s;flex-shrink:0;
  text-decoration:none;
}
.hdr-icon-btn:hover, #searchBtn:hover, #darkBtn:hover, #notifBtn:hover, #adBtn:hover, #adminPanelBtn:hover{background:#f3f4f6;color:#333;}
#searchBtn.active{background:#eff6ff;color:#1a56db;}
#darkBtn.active{background:#1e1e2e;color:#f0c040;}
#notifBtn.active{background:#f0fdf4;color:#16a34a;}

/* DARK MODE */
body.dark{background:#0f0f15;color:#e5e7eb;}
body.dark header{background:#1a1a2e;border-color:#2a2a40;}
body.dark .bubble{background:#1e1e30;color:#e5e7eb;}
body.dark .bubble.is-red{background:#2a1010;border-color:#e02020;}
body.dark .bubble-text{color:#e5e7eb;}
body.dark .bubble-headline{color:#fff;}
body.dark .msg-meta-name{color:#aaa;}
body.dark .msg-meta-time{color:#666;}
body.dark #feedWrap{background:#0f0f15;}
body.dark #searchBar{background:#1a1a2e;border-color:#2a2a40;}
body.dark #searchInput{background:#252535;border-color:#3a3a50;color:#e5e7eb;}
body.dark .hdr-name{color:#fff;}
body.dark .hdr-icon-btn, body.dark #searchBtn, body.dark #darkBtn, body.dark #notifBtn{color:#aaa;}
body.dark .hdr-icon-btn:hover, body.dark #searchBtn:hover, body.dark #darkBtn:hover, body.dark #notifBtn:hover{background:#2a2a3e;color:#fff;}

/* SEARCH */
#searchBtn{
  background:none;border:none;cursor:pointer;
  width:32px;height:32px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  color:#888;transition:background .15s,color .15s;flex-shrink:0;
}
#searchBtn:hover{background:#f3f4f6;color:#333;}
#searchBtn.active{background:#eff6ff;color:#1a56db;}

#searchBar{
  position:absolute;
  top:50%;right:100%; /* מימין לשמאל — יוצא משמאל לכפתור */
  margin-right:6px;
  transform:translateY(-50%);
  background:#fff;
  border:1.5px solid #e5e7eb;
  border-radius:10px;
  box-shadow:0 2px 12px rgba(0,0,0,.12);
  display:none;align-items:center;gap:6px;
  padding:5px 10px 5px 8px;
  z-index:200;
  width:300px;
  white-space:nowrap;
  animation:searchPop .15s ease-out;
}
@keyframes searchPop{from{opacity:0;transform:translateY(-50%) scaleX(.85) translateX(10px)}to{opacity:1;transform:translateY(-50%) scaleX(1) translateX(0)}}
#searchBar.open{display:flex;}
body.dark #searchBar{background:#1a1a2e;border-color:#3a3a50;}
#searchInput{
  flex:1;border:none;border-radius:99px;
  padding:4px 8px;font-size:14px;font-family:'Heebo',sans-serif;
  outline:none;direction:rtl;background:transparent;
}
body.dark #searchInput{color:#e5e7eb;}
#searchInput::placeholder{color:#bbb;}
#searchClear{
  background:none;border:none;cursor:pointer;color:#bbb;
  font-size:14px;padding:2px;display:none;line-height:1;flex-shrink:0;
}
#searchClear.show{display:block;}
#searchResults{
  display:none;flex:1;overflow-y:auto;padding:10px 0 24px;
}
#searchResultsInner{max-width:780px;margin:0 60px 0 auto;padding:0 10px 0 20px;display:flex;flex-direction:column;gap:6px;}
@media(max-width:600px){
  #searchResultsInner{margin:0;padding:0 8px;}
}
#searchEmpty{text-align:center;padding:40px 20px;color:#aaa;font-size:14px;display:none;}

/* LOAD MORE SPINNER */
#loadMoreSpinner{
  display:none;align-items:center;justify-content:center;
  padding:16px;gap:8px;color:#aaa;font-size:13px;font-family:'Heebo',sans-serif;
}
#loadMoreSpinner.show{display:flex;}
.lm-ring{
  width:22px;height:22px;border-radius:50%;
  border:2.5px solid #e5e7eb;border-top-color:#1a56db;
  animation:spin .7s linear infinite;flex-shrink:0;
}
@keyframes spin{to{transform:rotate(360deg)}}
#scrollDownBtn{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#fff;border:1.5px solid #e5e7eb;border-radius:99px;padding:7px 16px;font-size:13px;font-weight:700;color:#374151;cursor:pointer;display:none;align-items:center;gap:6px;box-shadow:0 4px 18px rgba(0,0,0,.11);font-family:'Heebo',sans-serif;z-index:50;}
#scrollDownBtn.show{display:flex;}
.unread-dot{width:8px;height:8px;border-radius:50%;background:#e02020;flex-shrink:0;display:none;box-shadow:0 0 0 2px #fff;}
#scrollDownBtn.has-new .unread-dot{display:block;}

#prog{position:fixed;top:0;inset-inline:0;height:2px;background:#1a56db;transform:scaleX(0);transform-origin:right;z-index:999;display:none;}
#prog.on{display:block;animation:pr 1.1s ease-in-out infinite;}
@keyframes pr{0%{transform:scaleX(0);transform-origin:right}50%{transform:scaleX(.55);transform-origin:right}100%{transform:scaleX(0);transform-origin:left}}

#empty{display:none;text-align:center;padding:60px 20px;color:#aaa;}
#empty i{font-size:36px;opacity:.2;margin-bottom:10px;display:block;}

/* LIGHTBOX */
#lightbox{
  position:fixed;inset:0;z-index:900;
  background:rgba(0,0,0,.88);
  display:none;align-items:center;justify-content:center;
  cursor:zoom-out;
  animation:lbIn .18s ease;
}
@keyframes lbIn{from{opacity:0}to{opacity:1}}
#lightbox.show{display:flex;}
#lightbox img{
  max-width:94vw;max-height:90vh;
  border-radius:10px;object-fit:contain;
  box-shadow:0 8px 40px rgba(0,0,0,.5);
  cursor:default;
}
#lbClose{
  position:fixed;top:14px;right:16px;
  background:rgba(255,255,255,.15);border:none;
  color:#fff;font-size:20px;cursor:pointer;
  width:38px;height:38px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  transition:background .12s;z-index:901;
}
#lbClose:hover{background:rgba(255,255,255,.28);}

@media(max-width:600px){
  #feedInner{margin:0;padding:0 8px;}
  .bubble{min-width:0;}
  .msg-col{flex:1;}
  #commentsPanel{width:100vw;}
  .ep-btn{font-size:15px;}
}
</style>
</head>
<body>
<div id="prog"></div>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <img class="login-logo-img" src="https://i.postimg.cc/zvyWy8wk/צילום_מסך_2026_03_01_031615.png" onerror="this.style.display='none'">
    <div class="login-title">שאגת הארי</div>
    <div id="googleBtn"></div>
    <div class="login-err" id="loginErr">אינך מורשה לצפייה בפיד.</div>
  </div>
</div>

<!-- AD SIDEBAR -->
<div id="adSidebar">
  <a id="adSidebarLink" href="#" target="_blank" rel="noopener noreferrer">
    <img id="adSidebarImg" src="" alt="פרסומת">
  </a>
</div>

<!-- APP -->
<div id="app">
  <header>
    <img class="hdr-avatar" src="https://i.postimg.cc/zvyWy8wk/צילום_מסך_2026_03_01_031615.png" onerror="this.style.background='#e02020'">
    <div class="hdr-info">
      <div class="hdr-name">שאגת הארי <span style="font-size:10px;font-weight:700;background:#fff3cd;color:#856404;border:1px solid #ffc107;border-radius:6px;padding:1px 6px;vertical-align:middle;">בהרצה</span></div>
      <div class="hdr-status"><div class="hdr-dot"></div>מחובר · עדכונים חיים</div>
    </div>
    <div class="hdr-user">
      <!-- חיפוש — wrapper עם position:relative כדי שה-popup יהיה ליד הכפתור -->
      <div style="position:relative;">
        <button id="searchBtn" onclick="toggleSearch()" title="חיפוש">
          <i class="fas fa-search" style="font-size:13px"></i>
        </button>
        <div id="searchBar">
          <input id="searchInput" type="text" placeholder="חיפוש..." oninput="onSearch(this.value)" />
          <button id="searchClear" onclick="clearSearch()"><i class="fas fa-times"></i></button>
        </div>
      </div>
      <!-- אימייל למנהל -->
      <a class="hdr-icon-btn" href="https://mail.google.com/mail/u/0/?view=cm&fs=1&tf=1&source=mailto&su=%D7%A4%D7%A0%D7%99%D7%94+%D7%9C%D7%9E%D7%A0%D7%94%D7%9C%D7%99+%D7%A7%D7%91%D7%95%D7%A6%D7%AA+%22%D7%A9%D7%90%D7%92%D7%AA+%D7%94%D7%90%D7%A8%D7%99+-+%D7%A2%D7%93%D7%9B%D7%95%D7%A0%D7%99%D7%9D%22&to=david%40hamakom.ovh&body=%D7%9B%D7%AA%D7%91%D7%95+%D7%9B%D7%90%D7%9F+%D7%90%D7%AA+%D7%AA%D7%95%D7%9B%D7%9F+%D7%94%D7%A4%D7%A0%D7%99%D7%94%3A%0A" target="_blank" rel="noopener" title="פנייה למנהל">
        <i class="fas fa-envelope" style="font-size:13px"></i>

// ── sanitize בסיסי ──
function esc(t) { return (t || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(t) { return esc(t).replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

function rich(t) {
  if (!t) return '';
  let s = t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  s = s.replace(/\*\*([^*\n]+)\*\*/g,'<strong>$1</strong>');
  s = s.replace(/\*([^*\n]+)\*/g,'<strong>$1</strong>');
  s = s.replace(/__([^_\n]+)__/g,'<u>$1</u>');
  s = s.replace(/_([^_\n]+)_/g,'<em>$1</em>');
  s = s.replace(/~~([^~\n]+)~~/g,'<s>$1</s>');
  // קישורים — רק http/https
  s = s.replace(/(https?:\/\/[^\s<>"']{1,500})/g,'<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>');
  return s;
}

function timeLabel(e) {
  const today = new Date().toLocaleDateString('he-IL',{day:'2-digit',month:'2-digit',year:'numeric'});
  return (e.date && e.date !== today) ? e.date + ' ' + e.time : (e.time || '');
}

// תיקון שעון UTC לשעון ישראל — רק לשעות שמגיעות מהשרת (תגובות)
function fixServerTime(t) {
  if (!t || !t.includes(':')) return t;
  const [h, m] = t.split(':').map(Number);
  return ((h + 2) % 24).toString().padStart(2, '0') + ':' + m.toString().padStart(2, '0');
}

/* ── AD SYSTEM ── */
const AD_KEY = 'shaagat_ad';
const AD_INTERVAL = 60 * 60 * 1000; // שעה

async function loadAd() {
  try {
    const r = await fetch(BACKEND + '/ad_get');

    } else {
      hideSideAd();
    }
  } catch(e) {}
}

function shouldShowAd() {
  const last = parseInt(localStorage.getItem(AD_KEY) || '0');
  return Date.now() - last > AD_INTERVAL;
}

function markAdShown() {

async function verifyAndLogin(user) {
  me = user; saveUser(user); applyLogin(); return true;
}

function applyLogin() {
  const av = document.getElementById('userAvatar');
  const avatarHtml = me.picture
    ? `<img src="${escAttr(me.picture)}" style="width:30px;height:30px;border-radius:50%;object-fit:cover;border:2px solid #eee">`
    : `<div style="width:30px;height:30px;border-radius:50%;background:#1a56db;color:#fff;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center">${esc(me.name[0].toUpperCase())}</div>`;
  av.innerHTML = `<div style="position:relative;cursor:pointer" onclick="toggleUserMenu(event)">

  </div>
  <div id="userMenu" style="display:none;position:absolute;top:48px;left:0;background:#fff;border:1px solid #e5e7eb;border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,.14);z-index:200;min-width:160px;overflow:hidden;font-family:'Heebo',sans-serif;">

  fetch(BACKEND + '/feed_login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email: me.email, name: me.name, picture: me.picture })
  }).then(r => r.json()).then(d => {
    // מעדכן את הספירה מיד מהתשובה — לא צריך לחכות ל-interval
    if (isAdmin() && d.count != null) {
      document.getElementById('adminUserCount').textContent = d.count;
    }
  }).catch(() => {}).finally(() => {
    if (isAdmin()) loadAdminUsers();
  });

    setInterval(loadAdminUsers, 30000);

function initGoogle() {
  google.accounts.id.initialize({ client_id: GOOGLE_CLIENT_ID, callback: handleLogin, auto_select: true });
  const saved = loadSavedUser();
  if (saved) { verifyAndLogin(saved); return; }
  google.accounts.id.renderButton(document.getElementById('googleBtn'), { theme:'outline', size:'large', locale:'he', width:240 });
  google.accounts.id.prompt();
}

async function handleLogin(resp) {
  let payload = {};
  try {
    const parts = resp.credential.split('.');
    if (parts.length !== 3) throw new Error('invalid token');
    payload = JSON.parse(atob(parts[1].replace(/-/g,'+').replace(/_/g,'/')));
  } catch(e) { return; }
  const email = (payload.email || '').toLowerCase();
  if (!email || !email.includes('@')) return;
  const user = { email, name: payload.name || email.split('@')[0], picture: payload.picture || '' };
  await verifyAndLogin(user);
}

/* ── BUILD MSG ── */
function buildMsg(e) {
  const red = e.profile === 'red';
  const id = e.id;
  const lines = (e.text || '').trim().split('\n');
  const h = lines[0] || '';
  const body = lines.slice(1).join('\n').trim();

  let content = '';
  if (red) {
    content = `<div class="bubble-headline">🚨 ${esc(h)}</div>`;
    if (body) content += `<div class="bubble-text" style="margin-top:4px">${rich(body)}</div>`;
  } else {
    content = `<div class="bubble-text">${rich(h + (body ? '\n' + body : ''))}</div>`;
  }

  let media = '';
  if (e.imgUrl) {
    const safeUrl = escAttr(e.imgUrl);
    media += `<div class="bubble-img"><img src="${safeUrl}" loading="lazy" style="cursor:pointer" onclick="openLightbox('${safeUrl}')" onerror="this.closest('.bubble-img').remove()"></div>`;
  }
  if (e.videoUrl) media += `<div class="bubble-vid"><a class="vid-btn" href="${escAttr(e.videoUrl)}" target="_blank" rel="noopener noreferrer"><i class="fas fa-play" style="font-size:10px"></i> סרטון</a></div>`;

  let btns = '';
  if (e.buttons && e.buttons.length) {
    btns = '<div class="bubble-btns">' + e.buttons.map(b =>
      `<a class="lnk-btn" href="${escAttr(b.url)}" target="_blank" rel="noopener noreferrer">${esc(b.text)}</a>`
    ).join('') + '</div>';
  }

  const n = cmtCount[id] || 0;
  const cmtLabel = n === 0 ? 'תגובות' : n === 1 ? '1 תגובה' : n + ' תגובות';

  return `<div class="msg-row" data-id="${escAttr(id)}">
    <img class="msg-av" src="${LOGO}" onerror="this.style.display='none'">
    <div class="msg-col">
      <div class="msg-meta">
        <span class="msg-meta-name">שאגת הארי</span>
        <span class="msg-meta-time">${esc(timeLabel(e))}</span>
      </div>

function renderRxn(msgId, rxns) {
  rxnCache[msgId] = rxns;
  const bar = document.getElementById('rxn-' + msgId);
  if (!bar) return;
  const addBtn = bar.querySelector('.rxn-add-btn');
  bar.innerHTML = '';

  // סוגי אימוג'י פעילים (מפתחות עם לפחות משתמש אחד)
  const activeTypes = Object.entries(rxns).filter(([, users]) => users.length);

  activeTypes.forEach(([emoji, users]) => {
    const mine = users.includes(me?.email);
    const c = document.createElement('button');
    c.className = 'rxn-chip' + (mine ? ' mine' : '');
    c.innerHTML = `<span class="rxn-emoji">${esc(emoji)}</span><span class="rxn-count">${users.length}</span>`;
    c.onclick = () => doReact(msgId, emoji);
    bar.appendChild(c);
  });

  // כפתור הוספה — מושבת אם כבר יש 5 סוגים שונים
  if (addBtn) {
    addBtn.classList.toggle('maxed', activeTypes.length >= 5);
    bar.appendChild(addBtn);
  } else {
    const b = document.createElement('button');
    b.className = 'rxn-add-btn' + (activeTypes.length >= 5 ? ' maxed' : '');
    b.title = activeTypes.length >= 5 ? 'הגעת למגבלת 5 סוגי תגובות' : 'הוסף תגובה';
    b.innerHTML = REACT_SVG;
    b.onclick = (ev) => openPicker(ev, msgId);
    bar.appendChild(b);
  }
}

/* ── EMOJI PICKER ── */
function openPicker(ev, msgId) {
  ev.stopPropagation();
  activePicker = msgId;
  const p = document.getElementById('emojiPicker');
  p.style.visibility = 'hidden'; p.style.display = 'flex';
  const pH = p.offsetHeight, pW = p.offsetWidth;
  p.style.display = ''; p.style.visibility = '';
  const rect = ev.currentTarget.getBoundingClientRect();
  const M = 8;
  let top = rect.top - pH - M;
  if (top < 56 + M) top = rect.bottom + M;
  top = Math.max(56 + M, top);
  let left = rect.left + rect.width / 2 - pW / 2;
  if (left < M) left = M;
  if (left + pW > window.innerWidth - M) left = window.innerWidth - pW - M;
  p.style.top = top + 'px';
  p.style.left = left + 'px';
  p.classList.toggle('show');
}

function pickEmoji(em) {
  document.getElementById('emojiPicker').classList.remove('show');
  if (activePicker) doReact(activePicker, em);
  activePicker = null;

document.addEventListener('click', e => {
  if (!e.target.closest('#emojiPicker') && !e.target.closest('.rxn-add-btn'))
    document.getElementById('emojiPicker').classList.remove('show');
});

async function doReact(msgId, emoji) {
  if (!me) return;
  if (typeof emoji !== 'string' || emoji.length > MAX_EMOJI_LEN) return;

  const current = rxnCache[msgId] || {};
  // בדיקת מגבלת 5 סוגים בצד הלקוח
  const activeTypes = Object.entries(current).filter(([, u]) => u.length);
  const isNewType = !(emoji in current);
  if (isNewType && activeTypes.length >= 5) return;

  // Optimistic update
  const users = [...(current[emoji] || [])];
  const myIdx = users.indexOf(me.email);
  if (myIdx >= 0) users.splice(myIdx, 1); else users.push(me.email);
  const optimistic = { ...current };
  if (users.length) optimistic[emoji] = users; else delete optimistic[emoji];
  renderRxn(msgId, optimistic);

  try {
    const r = await fetch(BACKEND + '/feed_react', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: me.email, msgId, emoji })
    });
    const d = await r.json();
    if (d.status === 'ok') renderRxn(msgId, d.reactions);
  } catch(e) {}
}

async function delCmt(msgId, cid) {

/* ── FEED ── */
async function loadFeed() {
  setLoading(true);
  try {
    const r = await fetch(BACKEND + '/feed?limit=20');
    const d = await r.json();
    if (d.status === 'ok') {
      items = [...d.feed].reverse();
      items.forEach(e => knownIds.add(e.id));
      lastTs = items.length ? Math.max(...items.map(e => e.ts || 0)) : 0;
      oldestTs = items.length ? Math.min(...items.map(e => e.ts || 0)) : 0;
      allLoaded = d.feed.length < 20; // פחות מ-20 = אין עוד
      const inner = document.getElementById('feedInner');
      inner.innerHTML = '';
      if (!items.length) {
        document.getElementById('empty').style.display = 'block';
      } else {
        inner.innerHTML = items.map(buildMsg).join('');
      }
      document.getElementById('feedWrap').scrollTop = document.getElementById('feedWrap').scrollHeight;
      if (items.length) await pollAll(true);
    }
  } catch(e) {}
  setLoading(false);
}

/* טעינת הודעות ישנות יותר בגלילה למעלה */
async function loadMore() {
  if (loadingMore || allLoaded || !oldestTs) return;
  loadingMore = true;
  document.getElementById('loadMoreSpinner').classList.add('show');
  try {
    const r = await fetch(BACKEND + `/feed?before=${oldestTs}&limit=20`);
    const d = await r.json();
    if (d.status === 'ok' && d.feed.length) {
      const older = d.feed.filter(e => !knownIds.has(e.id)).reverse();
      if (!older.length) {
        allLoaded = true;
      } else {
        older.forEach(e => { knownIds.add(e.id); items.unshift(e); });
        oldestTs = Math.min(...older.map(e => e.ts || Infinity));
        allLoaded = older.length < 20;
        const inner = document.getElementById('feedInner');
        const wrap = document.getElementById('feedWrap');
        const prevHeight = wrap.scrollHeight;
        const prevTop = wrap.scrollTop;
        inner.insertAdjacentHTML('afterbegin', older.map(buildMsg).join(''));
        wrap.scrollTop = prevTop + (wrap.scrollHeight - prevHeight);
        if (older.length) setTimeout(pollAll, 100);
      }
    } else {
      allLoaded = true;
    }
  } catch(e) {
    console.error('loadMore error', e);
  } finally {
    loadingMore = false;
    document.getElementById('loadMoreSpinner').classList.remove('show');
  }
}

/* ══ POLLING מאוחד — בקשה אחת לכל מה שצריך ══ */
async function pollAll() {
  // מנגנון נעילה: אם בקשה כבר רצה — לא מתחילים עוד אחת
  if (pollPending) return;
  if (!me || !items.length) return;
  pollPending = true;
  try {
    const r = await fetch(BACKEND + '/feed_poll', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        msgIds: items.map(e => e.id),
        since: lastTs
      })
    });
    const d = await r.json();
    if (d.status !== 'ok') return;

    // ── מבזקים חדשים ──
    const newRaw = d.new_items || [];
    // סינון כפילויות: רק IDs שעדיין לא ב-knownIds
    const ni = newRaw.filter(e => !knownIds.has(e.id));
    if (ni.length) {
      // תחילה מעדכנים lastTs ו-knownIds — לפני כל שינוי DOM
      // כך שבקשה מקבילה שתחזור באותו רגע תראה את ה-IDs החדשים
      lastTs = Math.max(...newRaw.map(e => e.ts || 0), lastTs);
      ni.forEach(e => knownIds.add(e.id));   // ← חייב לבוא לפני appendChild
      items.push(...ni);

      const inner = document.getElementById('feedInner');
      document.getElementById('empty').style.display = 'none';
      ni.forEach(e => {
        const div = document.createElement('div');
        div.innerHTML = buildMsg(e);
        inner.appendChild(div.firstChild);
      });
      if (atBottom) document.getElementById('feedWrap').scrollTop = 999999;
      else { newCount += ni.length; updateScrollBtn(); }
      // התראת Windows כשיש הודעה חדשה
      if (ni.length) sendNotification('שאגת הארי — הודעה חדשה', ni[ni.length-1].text?.substring(0,60) || '');
    } else if (newRaw.length) {
      lastTs = Math.max(...newRaw.map(e => e.ts || 0), lastTs);
    }

    // ── reactions (עדכון in-place, ללא scroll) ──
    const rxns = d.reactions || {};
    Object.entries(rxns).forEach(([mid, rxn]) => renderRxn(mid, rxn));

    // ── כמות תגובות ──
    const counts = d.comment_counts || {};
    Object.entries(counts).forEach(([mid, n]) => {
      if (n !== (cmtCount[mid] || 0)) { cmtCount[mid] = n; updateCmtBtn(mid, n); }
    });

  } catch(e) {}
  finally {
    // finally מבטיח שה-lock תמיד ישתחרר — גם במקרה של שגיאה
    pollPending = false;
  }
}

/* polling לתגובות בפאנל הפתוח — נשאר נפרד כי צריך עדכון מהיר יותר */
async function pollOpenComments() {
  if (!activeCmtMsgId) return;
  try {
    const r = await fetch(BACKEND + '/feed_comments?msgId=' + encodeURIComponent(activeCmtMsgId));
    const d = await r.json();
    const list = d.comments || [];
    if (list.length === (cmtCount[activeCmtMsgId] || 0)) return; // אין שינוי
    cmtCount[activeCmtMsgId] = list.length;
    updateCmtBtn(activeCmtMsgId, list.length);
    const b = document.getElementById('cpBody');
    const wasAtBottom = (b.scrollHeight - b.scrollTop - b.clientHeight) < 60;
    b.innerHTML = list.length ? list.map(c => buildCmt(activeCmtMsgId, c)).join('') : '<div class="no-cmt">עדיין אין תגובות</div>';
    if (wasAtBottom) b.scrollTop = b.scrollHeight;
  } catch(e) {}
}

function scrollToBottom() {
  document.getElementById('feedWrap').scrollTo({ top: 999999, behavior: 'smooth' });
  newCount = 0; updateScrollBtn();
}

function updateScrollBtn() {
  const btn = document.getElementById('scrollDownBtn'), txt = document.getElementById('scrollDownTxt');
  if (!atBottom) {
    btn.classList.add('show');
    if (newCount > 0) { btn.classList.add('has-new'); txt.textContent = newCount + ' חדשות'; }
    else { btn.classList.remove('has-new'); txt.textContent = 'למטה'; }
  } else {
    btn.classList.remove('show', 'has-new'); newCount = 0;
  }
}

document.getElementById('feedWrap').addEventListener('scroll', function() {
  atBottom = (this.scrollHeight - this.scrollTop - this.clientHeight) < 80;
  updateScrollBtn();
  // טעינת עוד הודעות כשגוללים לראש
  if (this.scrollTop < 120 && !loadingMore && !allLoaded) {
    loadMore();

}, { passive: true });

let searchTimer = null;

function toggleSearch() {
  const bar = document.getElementById('searchBar');
  const btn = document.getElementById('searchBtn');
  const isOpen = bar.classList.contains('open');
  if (isOpen) {
    clearSearch();
  } else {
    bar.classList.add('open');
    btn.classList.add('active');
    setTimeout(() => document.getElementById('searchInput').focus(), 280);
  }
}

function onSearch(val) {
  const clear = document.getElementById('searchClear');
  clear.classList.toggle('show', val.length > 0);
  clearTimeout(searchTimer);
  if (!val.trim()) {
    document.getElementById('searchResults').style.display = 'none';
    document.getElementById('feedWrap').style.display = '';
    return;
  }
  searchTimer = setTimeout(() => doSearch(val.trim()), 250);
}

function doSearch(q) {
  const qLow = q.toLowerCase();
  const results = items.filter(e => (e.text || '').toLowerCase().includes(qLow));
  const feedWrap = document.getElementById('feedWrap');
  const searchResults = document.getElementById('searchResults');
  const inner = document.getElementById('searchResultsInner');
  const empty = document.getElementById('searchEmpty');

  feedWrap.style.display = 'none';
  searchResults.style.display = 'block';

  if (!results.length) {
    inner.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  const escaped = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  inner.innerHTML = results.map(e =>
    buildMsg(e).replace(
      new RegExp(`(${escaped})`, 'gi'),
      '<mark style="background:#fff176;border-radius:3px;padding:0 1px">$1</mark>'
    )
  ).join('');
  results.forEach(e => { if (rxnCache[e.id]) renderRxn(e.id, rxnCache[e.id]); });
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').classList.remove('show');
  document.getElementById('searchResults').style.display = 'none';
  document.getElementById('searchResultsInner').innerHTML = '';
  document.getElementById('searchEmpty').style.display = 'none';
  document.getElementById('feedWrap').style.display = '';
  document.getElementById('searchBar').classList.remove('open');
  document.getElementById('searchBtn').classList.remove('active');
}

      box-shadow:0 1px 3px rgba(0,0,0,.06);
    ">
      <div style="font-size:10px;color:#aaa;margin-bottom:4px;display:flex;align-items:center;gap:4px;">
        ${red ? '<span style="color:#e02020;font-weight:700">🚨</span>' : ''}
        <span>${e.time || ''}</span>
        ${e.groupCount ? `<span style="margin-right:auto;background:#f3f4f6;border-radius:4px;padding:1px 5px;">${e.groupCount} קבוצות</span>` : ''}
      </div>
      <div style="font-weight:${red ? '700' : '500'}">${esc(preview)}${hasMore ? '<span style="color:#aaa">…</span>' : ''}</div>
      ${e.imgUrl ? `<div style="margin-top:5px;border-radius:6px;overflow:hidden;"><img src="${escAttr(e.imgUrl)}" style="width:100%;max-height:80px;object-fit:cover;display:block;" onerror="this.closest('div').remove()"></div>` : ''}
    </div>`;
  }).join('');
}

function closeAdminPanel() {
  document.getElementById('adminPanelModal').style.display = 'none';
  document.getElementById('adminPanelFrame').src = '';
}

/* ── DARK MODE ── */
function toggleDark() {
  const on = document.body.classList.toggle('dark');
  document.getElementById('darkBtn').classList.toggle('active', on);
  localStorage.setItem('shaagat_dark', on ? '1' : '0');
}

function initDark() {
  if (localStorage.getItem('shaagat_dark') === '1') {
    document.body.classList.add('dark');
    document.getElementById('darkBtn')?.classList.add('active');
  }
}

/* ── NOTIFICATIONS ── */
let notificationsOn = false;

async function toggleNotifications() {
  if (!('Notification' in window)) {
    alert('הדפדפן שלך לא תומך בהתראות');
    return;
  }
  if (notificationsOn) {
    notificationsOn = false;
    document.getElementById('notifBtn').classList.remove('active');
    localStorage.setItem('shaagat_notif', '0');
    return;
  }
  const perm = await Notification.requestPermission();
  if (perm === 'granted') {
    notificationsOn = true;
    document.getElementById('notifBtn').classList.add('active');
    localStorage.setItem('shaagat_notif', '1');
    new Notification('שאגת הארי', { body: 'התראות מופעלות ✓', icon: 'https://i.postimg.cc/zvyWy8wk/צילום_מסך_2026_03_01_031615.png' });
  }
}

function initNotifications() {
  if (localStorage.getItem('shaagat_notif') === '1' && Notification.permission === 'granted') {
    notificationsOn = true;
    document.getElementById('notifBtn')?.classList.add('active');
  }
}

function sendNotification(title, body) {
  if (!notificationsOn || Notification.permission !== 'granted') return;
  if (document.visibilityState === 'visible') return; // רק כשהמשתמש מחוץ לטאב
  new Notification(title || 'שאגת הארי', {
    body: body || 'הודעה חדשה',
    icon: 'https://i.postimg.cc/zvyWy8wk/צילום_מסך_2026_03_01_031615.png'
  });
}

/* ══ INTERVALS ══ */
setInterval(pollAll, 3000);            // הכל בבקשה אחת
setInterval(pollOpenComments, 3000);   // רק כשהפאנל פתוח, אחרת return מיד
setTimeout(pollAll, 800);              // עדכון ראשוני מהיר
</script>
